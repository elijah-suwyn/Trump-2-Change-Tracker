ve agenda for decades and why each reform effort generates intense conflict.\"],\"government/doge\":[\"The history of federal reorganization is a history of ambitious plans and constrained results. Presidents from Franklin Roosevelt onward have proposed to consolidate, rationalize, and reduce the executive branch, and the fundamental difficulty has always been the same: agencies are creatures of statute, and only statute can abolish them. A president can reorganize the boxes on an organization chart, reassign functions between departments, and leave positions unfilled. What a president cannot do unilaterally is eliminate the legal mandate those boxes fulfill. That requires an act of Congress.\",\"This constitutional constraint is not a technicality. It is the central fact that gives every dismantlement effort its particular legal shape, explaining why such efforts so frequently end in federal court rather than in a completed reorganization. The mandate of an agency, written into law by Congress, does not disappear because the executive stops funding it or stops enforcing it. It waits for either a court to say the executive must fulfill it or a Congress to say it no longer should.\"],\"government/dereg\":[\"There is a tendency to think of regulation as a one-way ratchet, rules accumulate and do not retreat. The historical record tells a more complicated story. The Reagan administration's first term produced the largest single-year reduction in regulatory output since the APA's passage, driven by executive orders that required cost-benefit review before any significant rule could be issued and by a White House review process that could slow or stop agency rulemaking before it began. The Bush, Clinton, Obama, and Biden administrations each modified but did not eliminate this review structure, establishing OIRA review as a durable institution rather than a partisan invention. The cycle of tightening and loosening, more required analysis here, fewer required approvals there, a change in whose costs count and whose benefits count, is the normal rhythm of the regulatory system across administrations.\",\"What distinguishes the present episode from earlier deregulatory efforts is partly the ambition of the numerical target (a ten-to-one rescission ratio as a standing requirement rather than a goal) and partly a legal theory that goes beyond cost-benefit to question whether the underlying delegations were constitutionally valid at all. The claim that a rule should be rescinded not merely because it costs more than it benefits but because Congress was not constitutionally permitted to delegate its making invites courts to revisit the legal foundations of the administrative state, not merely to trim its outputs. The outcome of that legal theory remains open and contested.\"],\"government/removal\":[\"The Supreme Court established the doctrine governing presidential removal in a sequence of cases stretching across a century, and the doctrine still has not settled into a clear, stable rule. The Court's 1926 decision in *Myers v. United States* held that the president possesses an unrestricted power to remove executive officers, postmasters in that case, but the reasoning reached broadly. Nine years later, in *Humphrey's Executor v. United States*, the Court drew a sharp distinction: the president could not remove members of independent regulatory commissions \\\"at will,\\\" because those bodies exercise \\\"quasi-legislative\\\" and \\\"quasi-judicial\\\" functions, not purely executive ones. The decision insulated the Federal Trade Commission from unilateral presidential removal and, by extension, established that some agencies could be constitutionally independent of the president's directive authority.\",\"The tension between *Myers* (broad presidential power) and *Humphrey's Executor* (limited removal for certain agencies) has been the constitutional fault line of administrative law ever since. The Court has since narrowed *Humphrey's Executor* in several respects, limiting it to multi-member commissions, requiring some connection between cause and independence, but has never overruled it.\",\"Steven Calabresi and Christopher Yoo's historical study argues that this fault line was a mistake from the beginning. Their survey of every administration from Washington through George W. Bush finds that each president understood himself to hold a unitary executive power over all subordinate officers, that the independent-agency model is a constitutional aberration rather than a settled feature of American government. This is the pro-unitary-executive position, and it is named as such because it is a contested interpretive argument, not a neutral description of settled law. The counter-tradition, that the independence of certain regulatory bodies is constitutionally permissible and has long been accepted in practice, is carried in the present corpus primarily through the CRS pass-A coverage of the *Humphrey's Executor* line.\"],\"government/schedulef\":[\"The United States did not begin with a merit-based civil service. For most of the nineteenth century, the federal workforce operated as a spoils system: election victories brought wholesale replacement of the previous administration's employees with the new party's loyalists. The system was, by any honest measure, often corrupt and inefficient, offices were distributed not to the competent but to the connected, and departments changed character wholesale with each change of administration. The assassination of President Garfield in 1881 by a disappointed office-seeker created the political shock the reformers had been waiting for. The Pendleton Civil Service Reform Act of 1883 established that at least some federal jobs should be filled by competitive examination and that employees so hired could not be dismissed for partisan reasons. The classified service grew from there, slowly at first, then faster, as each departing president found it useful to extend merit protections to more positions before leaving office.\",\"Hugh Heclo's analysis of the political-appointee and career-official relationship adds a layer that the formal statutory history tends to obscure: the lived tension between people who arrive in an agency with a political mandate and people who were there before them and will be there after them. Career officials are not inert. They have expertise, institutional memory, and a strong stake in the survival of their programs. Political appointees have authority and energy but limited knowledge of what they are trying to change, and limited time. The relationship between these two groups, symbiotic, competitive, and often suspicious, is the actual engine of day-to-day federal governance. This tension is not a pathology; it is the designed friction between democratic accountability and institutional continuity.\",\"The Civil Service Reform Act of 1978 reorganized and codified this relationship, abolishing the old Civil Service Commission and creating the Senior Executive Service, a corps of senior career officials who could be moved between agencies to serve broader government needs, while retaining merit protections against politically motivated removal. It is the protections established by that 1978 Act, and the framework of competitive appointment under which they operate, that Schedule F's reclassification of \\\"policy-influencing\\\" positions is designed to reach.\"],\"government/ig\":[\"Before 1978, there was no uniform system of internal auditors and investigators in the federal government. Individual agencies maintained their own audit functions, but the independence of those functions from agency leadership varied enormously, and there was no guaranteed channel to report findings directly to Congress. The Inspector General Act of 1978, passed in the aftermath of Watergate, during a period of unusual congressional assertiveness about executive accountability, established statutory inspectors general in twelve cabinet departments. Each was appointed by the president and confirmed by the Senate; each was given an explicit mandate to be independent of the agency's own management; each was required to report significant findings to both the agency head and directly to Congress.\",\"The independence design is not cosmetic. An inspector general who reports only to the agency head will quickly find that investigations shape themselves around what the head finds useful to investigate. The dual-reporting structure, and the statutory provision that an IG can be removed only by the president with notice to Congress, not by a cabinet secretary acting alone, were deliberate architectural choices to give inspectors general the institutional insulation they need to do work that may be unwelcome to their own agency's leadership. The IG community has grown from the original twelve to more than fifty offices, and the fundamental design has remained consistent precisely because the logic behind it has not changed.\"],\"government/impound\":[\"The Constitution's Appropriations Clause, \\\"No Money shall be drawn from the Treasury, but in Consequence of Appropriations made by Law\\\", is perhaps the most concrete check that Congress holds over the executive branch. If Congress appropriates money for a program, the executive must spend it; if Congress does not appropriate money for a purpose, the executive cannot fund it. The simplicity of the principle has not prevented it from being tested repeatedly, and the tension it produces, between a Congress that wants its spending decisions respected and an executive that wants flexibility over how programs are run, has recurred in every era of active government.\",\"The most significant modern confrontation came during the Nixon administration, when the president began withholding appropriated funds on a scale large enough to effectively rewrite budget priorities without congressional action. Congress's response, the Impoundment Control Act of 1974, imposed a formal procedure: the president could ask Congress to rescind appropriated funds, but Congress had to affirmatively vote to cancel them; the president could defer spending for limited periods, but Congress could disapprove by resolution. The Act was designed to settle, clearly, that the power of the purse belongs to Congress and that the executive's role is to execute appropriations, not revise them by inaction. The question of whether the executive retains any inherent impoundment authority beyond what the 1974 Act permits, and whether its impoundment findings carry legal force, remains contested.\"],\"government/data\":[\"A government that runs on data has an obvious institutional interest in what that data shows, and therefore a structural reason to distort it, whether by pressuring statisticians, changing methodologies, or simply removing the people whose numbers are inconvenient. The federal statistical system was deliberately designed to make such distortion difficult. Rather than a single centralized statistical ministry, the United States operates with more than a hundred statistical agencies scattered across departments, each with its own professional staff, methodology, and independence from agency leadership. Thirteen of these are designated \\\"principal statistical agencies\\\" whose credentialed independence is specifically protected, the Bureau of Labor Statistics, the Bureau of Economic Analysis, the Census Bureau, and others whose outputs form the factual substrate of national policy decisions.\",\"The Confidential Information Protection and Statistical Efficiency Act of 2002 formalized data-integrity protections and restricted the use of statistically collected information for regulatory or enforcement purposes, recognizing that people will not cooperate with census and survey work if they fear the information will be used against them. The trust model of the entire system rests on three things: independence of methodology (the numbers are computed the same way regardless of who is in office), transparency of process (the methodology is published and subject to professional peer review), and continuity of measurement (the unemployment rate means the same thing this month as it meant a decade ago because the same trained statisticians are using the same professionally vetted approach). Disrupt any of these three, and the usefulness of the data, as a basis for policy, as a benchmark for the economy, as a shared factual reality, erodes accordingly.\"],\"government/doj\":[\"The Department of Justice is younger than most Americans suppose. For the republic's first eighty years, there was no department of justice at all. The attorney general was a part-time figure who argued the government's cases before the Supreme Court and gave legal opinions to the president on request; the actual legal work of the federal government was scattered among department solicitors and private contractors. Jed Shugerman's history of the DOJ's founding in 1870 traces how the consolidation of legal functions into a single department reflected the Reconstruction Congress's ambition to use federal law enforcement against the Ku Klux Klan in the South, and how quickly that ambition faded when Reconstruction ended, leaving a professional machinery in place but without the political will to use it for civil-rights enforcement. The founding tension between professionalization and political purpose has never been fully resolved; it simply recurs in different forms.\",\"Cornell Clayton's political science account of the attorney general's role identifies the structural problem clearly: the AG is simultaneously the president's lawyer, the government's lawyer, and the nation's chief law-enforcement officer, three roles that can and do conflict. An AG who acts primarily as the president's personal lawyer may direct the machinery of prosecution toward the president's opponents and away from the president's allies. An AG who insists on institutional independence may obstruct the president's policy agenda. There is no constitutional formula that dissolves this tension; different administrations have managed it differently, and the choice of management style has real consequences for how the DOJ functions.\",\"The presidential pardon power, Article II's grant of authority to \\\"grant Reprieves and Pardons for Offences against the United States, except in Cases of Impeachment\\\", operates at the most unilateral end of executive authority. Alexander Hamilton explained it in Federalist No. 74 as a tool of mercy and political stabilization: sometimes the rigid application of law produces injustice, and sometimes the national interest requires letting go of grievances. The constitutional scope of the pardon power is extremely broad; its limits are almost entirely political and reputational rather than legal.\"],\"government/courts\":[\"The independence of the federal judiciary from the political branches is not self-enforcing. It rests on a combination of constitutional design, life tenure, protected salaries, professional norms, and the willingness of each branch to accept the others' authority in practice. Jed Shugerman's history of American judicial independence traces how courts have repeatedly navigated the tension between democratic accountability (which says judges should answer to the people) and insulation from political pressure (which the rule of law requires). Neither side of this tension is permanently resolved; it recurs whenever the executive and judicial branches find themselves at cross-purposes over a contested question.\",\"The Administrative Procedure Act gives courts a specific legal role in reviewing executive action: under Section 706, a court may set aside agency action that is \\\"arbitrary, capricious, an abuse of discretion, or otherwise not in accordance with law,\\\" that exceeds statutory authority, or that violates constitutional requirements. This is the legal channel through which most challenges to executive-branch changes travel. The scope and availability of that review, who can bring a challenge, in which district, before which judges, determines how effectively the judicial check on executive power operates in practice. One variable that has become increasingly contested is the scope of the remedy: whether a court that finds executive action unlawful may block it nationwide as to everyone, or only as to the parties who brought the case. The nationwide injunction sits at the intersection of judicial authority, executive power, and the Constitution's structure, and its proper scope is an open and actively litigated question.\"],\"government/fed\":[\"The constitutional principle that the federal government may not \\\"commandeer\\\" the states, may not simply order state and local officials to implement federal programs against their will, is not a historical curiosity. It is active doctrine, confirmed and extended by the Supreme Court through a series of decisions in the 1990s and 2000s. The anti-commandeering rule means that the federal government, when it wants states to cooperate with federal policy, must use indirect mechanisms: offering money with conditions attached (the Spending Clause), preempting contrary state law in areas where Congress has legislated, or deploying its own officers to enforce federal law. What it generally cannot do is treat state governments as administrative subdivisions that must execute whatever the federal government requires.\",\"The Posse Comitatus Act of 1878 is a separate but related constraint, and it carries a history worth knowing because the history shapes what the Act means. The Act, passed at the end of Reconstruction, when federal troops had been deployed throughout the Southern states for nearly a decade, prohibited the Army from being used to execute civilian law except as expressly authorized by the Constitution or an act of Congress. It was, in significant measure, a political victory for the South's campaign to end military Reconstruction: federal troops would no longer police Southern elections or protect Black citizens from violence. That origin is not heroic, but the principle the Act established, that the military's role in domestic law enforcement should be strictly limited, has been accepted across the political spectrum and reinforced by subsequent legislation and professional military norms. The exceptions that have been added to the Act over the decades (for drug interdiction, disaster response, certain other purposes) have been contested each time they were created.\"],\"government/elections\":[\"Federal elections are administered by the states, under rules set partly by Congress and partly by the states themselves, an arrangement that produces enormous variation in how elections are conducted from state to state and that has been the source of persistent constitutional and legal controversy. The Constitution gives Congress the power to regulate the \\\"Times, Places and Manner\\\" of federal elections, and Congress has used that power selectively: requiring states to accept certain voter-registration methods (the National Voter Registration Act of 1993, widely called Motor Voter), mandating accessible polling equipment and provisional balloting (the Help America Vote Act of 2002), and setting other baseline requirements. But Congress has left large areas of election administration to state discretion, and state choices in those areas have been the battleground of election litigation for decades.\",\"Richard Hasen's account of how election law became a partisan battlefield identifies a pattern that has hardened over successive cycles: one side raises allegations of fraud to justify tighter registration and voting requirements; the other side argues that the fraud is minimal and the requirements amount to suppression; courts mediate the dispute while both sides pursue litigation as a primary political strategy. The pattern Hasen documents, allegations driving restrictions, restrictions generating litigation, courts determining the rules, is the backdrop against which any new federal involvement in election administration must be understood. The federal role in elections is constitutionally bounded but politically consequential, and that combination has made it persistently contentious.\"],\"health/medicaid\":[\"Medicaid was created alongside Medicare in 1965, but it was built on different principles and it has operated differently ever since. Medicare is a universal program for a defined population, the elderly, funded by a dedicated payroll tax and federal general revenues, delivered by a federal agency (the Centers for Medicare and Medicaid Services), and largely uniform in its benefits. Medicaid is a joint federal-state program, means-tested, targeted at specific \\\"categorical\\\" populations (originally the poor elderly, the blind, the disabled, and mothers and children in certain circumstances), with the federal government contributing a matching share of each state's spending under a formula called the Federal Medical Assistance Percentage (FMAP), and with states retaining significant discretion over eligibility levels and covered services within federal minimum floors.\",\"The financing structure is the key to everything that follows. Because the federal government matches state spending on a formula basis, contributing anywhere from 50 to 83 cents of every dollar, depending on a state's per capita income, Medicaid is an open-ended entitlement: the federal government has historically been obligated to match whatever eligible spending the states generate, with no annual cap. This structure gives states an incentive to expand coverage (because federal dollars come with it) but also gives the federal government an ongoing fiscal exposure that grows with enrollment and medical costs. It is also the structure that makes Medicaid both a health program and a fiscal transfer from the federal government to the states, and the structure that sits at the center of every debate about Medicaid's future.\",\"Provider taxes, a mechanism by which states levy taxes on Medicaid providers, use the revenue to draw down additional federal matching funds, and then return much of the tax to the providers, were developed in the 1980s and 1990s as a way for states to maximize their federal Medicaid matching funds. The federal government has regulated them without eliminating them. The One Big Beautiful Bill Act's limits on provider taxes, and its other changes to the FMAP structure, are the legislative culmination of four decades of federal concern about states' use of financing mechanisms to inflate their federal draws. Whether those limits are fiscal prudence or coverage reduction, or both, depends on whether you are reading the change through Murray's efficiency lens or Wilson's structural-adequacy lens. The corpus holds both.\"],\"health/aca\":[\"The Affordable Care Act's architecture reflects the constraints under which it was built. The employer-based insurance system was too embedded, too many people had it, too many employers provided it, too many insurers administered it, for any reform to displace it wholesale. Single-payer proposals that would have covered everyone through a government payer ran into the same wall that had blocked national insurance for sixty years: the organized opposition of a $1 trillion private health insurance industry and the political difficulty of promising to change coverage for the roughly 180 million people who had employer-sponsored plans and were, by and large, satisfied with them. The ACA's designers worked within these constraints and produced a law that regulated the employer-based market without replacing it, expanded Medicaid for those below 138 percent of the poverty line (in states willing to accept the expansion), and created regulated \\\"marketplaces\\\" for those above the Medicaid threshold who lacked employer coverage, with premium tax credits on a sliding scale to make marketplace plans affordable.\",\"The premium tax credit is the ACA's central mechanism for the uninsured middle. It is calculated on a formula: the credit covers the difference between a \\\"benchmark\\\" marketplace plan and the amount the household is expected to contribute (a percentage of income, capped at 8.5 percent under the enhanced credits established by the American Rescue Plan and extended by the Inflation Reduction Act). Without the enhanced credits, the ACA marketplaces were accessible but not necessarily affordable to middle-income households; with the enhanced credits, enrollment reached record levels. The expiration of the enhanced credits at the end of 2025 is, in financial terms, a repeal of the enhancement, not of the ACA itself, which remains law, but of the additional subsidy that made the marketplaces affordable to a much larger population than the original ACA served.\"],\"health/medicare\":[\"The story of prescription-drug pricing in Medicare is a story of one decision made in 2003 and then contested for twenty years until it was finally reversed. When Congress created Medicare Part D, the prescription-drug benefit, in 2003, it prohibited Medicare from negotiating drug prices directly with pharmaceutical manufacturers, requiring instead that it rely on private plan administrators to negotiate on its behalf. This prohibition was not an oversight; it was a deliberate political choice reflecting the pharmaceutical industry's influence over the 2003 Republican majority, and it was maintained by every subsequent Congress and administration until the Inflation Reduction Act of 2022 granted CMS limited authority to negotiate prices for a defined list of high-cost drugs.\",\"Marmor's account of Medicare's political history anticipates exactly this kind of episode: the same dynamics that produced the Medicare bill's deliberate exclusion of prescription drugs in 1965 produced the 2003 drug-benefit design that protected manufacturers from price negotiation. In both cases, the pharmaceutical industry was part of the coalition that had to be accommodated to pass the legislation, and accommodation took the form of structural protections for the industry's pricing power. The Most-Favored-Nation executive order and the manufacturer pricing agreements developed under the current administration represent a different approach to the same problem, bypassing the legislative route in favor of executive action, a mechanism that is available under the Emergency Price Stabilization Act but that has not been used for drug pricing before. Whether the approach is durable, enforceable, and sufficient is a Phase-2 question; the historical spine establishes that the drug-pricing problem it is attempting to address is not new.\"],\"health/repro\":[\"The Emergency Medical Treatment and Labor Act, passed in 1986, established a requirement that applies to every hospital that participates in Medicare, which is nearly every hospital in the United States. Before receiving or transferring a patient, a Medicare-participating emergency department must screen for and stabilize any emergency medical condition. The law was passed in response to the practice of \\\"patient dumping\\\", hospitals turning away uninsured patients in emergencies, and its original concern was economic, not reproductive. But because emergency medical conditions include pregnancy complications, and because some of those complications, ectopic pregnancy, severe preeclampsia, septic miscarriage, can require procedures that are also used for elective abortion, EMTALA has become the central statutory battleground between abortion-restriction laws and federal access requirements.\",\"Title X of the Public Health Service Act, passed in 1970, funds a national network of family-planning clinics, providing contraception, STI testing, cancer screening, and related services primarily to low-income patients who might otherwise have no access to a clinician. For decades, Title X operated as a neutral funding stream that included abortion referrals but prohibited direct use of Title X funds for abortion; the \\\"gag rule\\\" (prohibiting referrals at federally funded clinics) was added under Reagan, removed under Clinton, reinstated under Trump's first term, and removed again under Biden. Title X is not the constitutional question, it is a funding-condition question: what can Congress require as a condition of a federal grant? The Title X reallocation changes who receives the grants without touching the statutory framework. That framework, and the funding-condition logic, is what sits under the program/access dimension of this node.\"],\"health/va\":[\"The Veterans Health Administration is an anomaly in the American healthcare system: a fully government-owned, government-operated, single-payer health network, serving about 9 million veteran patients annually, operating through 171 medical centers and 1,112 outpatient facilities, entirely separate from the employer-insurance/Medicare/Medicaid complex that covers civilian Americans. It was built on the premise, enacted in law after World War II, that the federal government owes veterans who were injured or disabled in service a lifetime of healthcare as a condition of their service, and that the government should deliver that care through its own facilities rather than purchasing it from the private market.\",\"The debate about whether this model serves veterans well has intensified since the 2014 wait-time scandal, when it emerged that the VHA was misreporting appointment wait times while veterans waited months for care. The Veterans Choice Act of 2014 and the MISSION Act of 2018 established the \\\"community care\\\" network, an alternative to VHA direct care, allowing veterans to see private providers when VHA care is not available within distance or time standards, with the federal government paying the bill. The community-care program is the structural frame for the current reorganization: moving from five regional networks for community care to two is a change in the administrative structure of a program that was itself only a decade old. Whether consolidating the network improves efficiency and veteran access, or introduces the kind of contracting fragmentation that has historically troubled large government purchasing programs, is the kind of question that sits between the spine and Phase 2 interpretation.\"],\"health/hhsreorg\":[\"The Department of Health and Human Services is not a single, coherent organization in the way that, say, the Department of Defense is. It is an umbrella that covers the health-science agencies (NIH, CDC, FDA, CMS), the human-services agencies (the Administration for Children and Families, the Administration for Community Living), and a set of smaller offices and programs. The agencies under its umbrella have histories that predate HHS itself, the Public Health Service, from which NIH and CDC descend, traces its origins to the Marine Hospital Service of 1798, and they have their own scientific cultures, their own congressional relationships, and their own professional communities that do not easily blend.\",\"This institutional complexity is what makes large-scale reorganization in the federal health bureaucracy difficult and consequential. The IOM's 1988 core-functions framework, assessment, policy development, assurance, was not describing a unified system; it was describing a set of functions that needed to be performed by whatever organizational arrangement existed. A reorganization that consolidates agencies or removes personnel changes which institutions perform those functions, and how well. Whether consolidation under an \\\"Administration for a Healthy America\\\" improves coordination and eliminates duplication, or disrupts operational relationships that took decades to build and cannot be reassembled quickly, is not a question the historical spine can answer, but the historical spine establishes that the three core functions are the right frame for evaluating the question.\"],\"health/vaccines\":[\"Vaccines are among the most effective interventions in the history of public health. Smallpox has been eradicated. Polio, which paralyzed or killed hundreds of thousands of Americans before the Salk vaccine, is functionally absent from the Western Hemisphere. Measles, which killed millions annually before the measles vaccine, was declared eliminated in the United States in 2000. These outcomes were produced by combinations of scientific research, regulatory approval, and public-health programs that achieved and maintained high rates of vaccination in the population, because vaccines protect not only the vaccinated individual but the community around them: enough vaccination, maintained at high enough rates, prevents pathogens from finding hosts to infect.\",\"The Advisory Committee on Immunization Practices is the body that has managed the scientific dimension of this system since 1964. It is a federal advisory committee, chartered under the Federal Advisory Committee Act, composed of physicians, epidemiologists, immunologists, and public-health officials who review the evidence on vaccine safety and efficacy and recommend which vaccines should be included in the childhood and adult immunization schedules. The CDC Director has the authority to accept, modify, or reject ACIP recommendations; in practice, ACIP recommendations have been accepted as written for decades. The committee's composition, medical and public-health experts, appointed through a process that includes conflict-of-interest screening, and its advisory role are what the current charter revision and membership changes directly affect.\",\"There are two frames through which the ACIP changes can be read, and both are in genuine use. The first frame: the ACIP has operated as a body of scientific consensus, and its recommendations carry weight because they reflect the review of qualified experts; removing and replacing its members introduces political calculation into what should be a scientific function, and narrowing the COVID-19 schedule for healthy children and pregnant women against the weight of immunological evidence risks vaccination rates that have maintained elimination status. The second frame: the ACIP's recommendations have been treated as effectively mandatory despite being formally advisory, reducing parental and physician autonomy; the committee has not adequately considered the preferences of communities skeptical of specific recommendations; and restoring the advisory committee's role as advisory, rather than effectively dispositive, returns authority to the CDC Director and to individual practitioners. Both frames are made in good faith, and the corpus holds both. The historical spine establishes the ACIP's institutional history and function; the Phase-2 record will establish what specific changes were made and what their effects have been.\"],\"health/biomed\":[\"The National Institutes of Health is the world's largest public funder of biomedical research. Its budget of roughly $47 billion a year funds research conducted at its own laboratories in Bethesda and at approximately 2,500 universities and research institutions across the country. Most of that money goes out in the form of grants, individual research projects, research training, and institutional support, not in the form of direct NIH laboratory work, which means that the NIH's primary function is not to conduct research itself but to fund and organize the research enterprise of the American university system.\",\"The indirect-cost rate is the mechanism by which universities recover the overhead costs of sponsored research, the laboratories, the shared equipment, the research compliance offices, the IT systems, the heat and light and space, that cannot be charged to individual research projects but that make the research possible. These rates are negotiated individually between each institution and the federal government, based on actual cost audits, and typically run between 25 and 60 percent of direct costs. The NIH's February 2025 proposal to cap all indirect cost rates at 15 percent, roughly half the average negotiated rate, was not a change to grant eligibility rules or research priorities; it was a change to the financial formula under which universities recover the cost of hosting federally sponsored research. Its practical effect, if allowed to take effect, would have been to require universities to absorb approximately $4 billion a year in costs that the federal government had previously agreed to pay, costs that universities argued would force them to reduce research staff, close laboratories, and decline federal grants. The District of Massachusetts permanently enjoined the cap in April 2025; the First Circuit upheld the injunction in January 2026.\",\"The Food and Drug Administration's role in this umbrella is the regulatory complement to NIH's research-funding role: FDA ensures that drugs and medical devices are safe and effective before they reach patients, and that the food supply meets safety standards. The framework for drug approval, randomized controlled trials, phase I/II/III sequential testing, the requirement of evidence of both safety and efficacy, was built over decades after the thalidomide crisis of the early 1960s prompted Congress to strengthen the drug-approval process. Changes to that framework, whether through expedited pathways, through reduced evidentiary requirements, or through the food-additive approvals and dye-phase-out decisions, sit on a baseline established by that post-thalidomide regulatory settlement.\"],\"health/snap\":[\"The food-stamp program began as a pilot in 1961 and became permanent law under the Food Stamp Act of 1964, one of the Great Society's early legislative achievements. Its original design was straightforward: low-income households would receive coupons (later electronic benefit cards) that could be used to purchase food at grocery stores, with the federal government paying the full cost of the benefit. The program was named Supplemental Nutrition Assistance Program and moved to electronic delivery in 2008.\",\"The SNAP eligibility structure distinguishes between \\\"categorically eligible\\\" households (those already receiving benefits from certain other means-tested programs, and thus automatically qualified for SNAP) and \\\"gross income eligible\\\" households (those who meet an income test set at 130 percent of the federal poverty level). Within the gross-income-eligible population, able-bodied adults without dependents (ABAWDs) have been subject to work requirements, a requirement to work, participate in job training, or do community service for at least 20 hours a week, as a condition of receiving benefits beyond three months in a three-year period. The 1996 welfare reform introduced these requirements; waivers were available for areas with high unemployment.\",\"The One Big Beautiful Bill Act expanded the ABAWD work-requirement age from 49 to 64, extending the time-limited benefit rule to a population that was not previously subject to it. It also introduced a new state cost-sharing requirement, beginning in FY2028, under which states with benefit payment-error rates above a 6 percent threshold would share a portion of SNAP's benefit costs, shifting the program's funding structure from 100 percent federal on the benefit side to partially state-funded for states with high error rates. The work-requirement expansion is straightforwardly in the Murray tradition: the behavioral critique of dependency, applied to a new age cohort. The counterargument, that adults aged 50-64 face labor-market barriers (age discrimination, health limitations, caregiving obligations) that work requirements cannot address, is the Wilson tradition's application to the same population. The corpus holds both.\"],\"health/cash\":[\"The Aid to Families with Dependent Children program was created by the Social Security Act of 1935, originally to support widows and their children, the archetypal \\\"deserving poor\\\" of the New Deal's categorical approach. Over the following decades, as the economy changed and as Congress repeatedly expanded eligibility, AFDC evolved into the primary cash-assistance program for low-income families, including single mothers who had never been married and families in which the father was present but unemployed. By the 1980s, AFDC had become the center of the welfare debate, the program most associated with the dependency critique, and the primary target of the reform movement that Murray's work had helped to animate.\",\"The Personal Responsibility and Work Opportunity Reconciliation Act of 1996 replaced AFDC with TANF, Temporary Assistance for Needy Families, in the most significant restructuring of American cash assistance since the New Deal. TANF converted the open-ended federal matching grant into a block grant fixed at $16.5 billion per year, imposed a lifetime limit of 60 months on federally funded assistance, and required that a specified percentage of each state's TANF caseload be engaged in work or work-related activities. The block-grant structure gave states flexibility to design their own programs within the federal requirements; it also meant that the federal funding was capped regardless of need, and that states could shift funds toward activities other than cash assistance. Since 1997, the $16.5 billion annual block grant has remained flat, it has never been adjusted for inflation, while its purchasing power has fallen by roughly 40 percent.\",\"The TANF block grant's flat funding is one of the clearest illustrations of the contested-interpretation problem at the core of this umbrella: from one perspective, the flat grant has constrained states to operate efficient, work-focused programs and has held federal spending steady while the caseload fell; from the other, it has left the program's real value eroding at exactly the time that poverty research has identified inadequate income support as a driver of long-term harm to children. The corpus holds both.\"],\"health/ssa\":[\"The Social Security program, the Old-Age, Survivors, and Disability Insurance program created by the Social Security Act of 1935 and extended repeatedly in the following decades, is the largest single program in the federal budget and the program with the broadest political constituency. It pays benefits to retired workers, their spouses and survivors, and workers who become disabled before reaching retirement age. It is funded by payroll taxes paid by workers and employers throughout their working lives, held in the Old-Age and Survivors Insurance Trust Fund and the Disability Insurance Trust Fund, and administered by the Social Security Administration, which operates a national network of field offices and telephone services for enrollment, benefit calculation, disability determination, and claims processing.\",\"The Social Security program itself, the benefit structure, the tax rates, the eligibility ages, is essentially unchanged under the current administration. What has changed is the administrative capacity of the SSA: the agency has reduced its workforce from approximately 57,000 to approximately 50,000, restricted its telephone and field-office services, adopted a 100 percent overpayment-recovery policy (previously phased), and been subject to DOGE data-access arrangements that have generated litigation and privacy concerns. These are changes to how the program delivers benefits, not to what benefits it delivers. Whether those changes are an efficiency improvement, reducing costs in a delivery agency that had grown bloated relative to its function, or a service-capacity reduction that prevents eligible beneficiaries from accessing benefits they have earned, is the contested question. The historical spine establishes what SSA is and how it works; Phase 2 will establish what the changes have actually done to claims processing, wait times, and benefit delivery.\"],\"rights/dei\":[\"Executive Order 11246, signed by President Lyndon Johnson in 1965, required federal contractors to take affirmative action in their employment practices, not merely to avoid discrimination, but to actively recruit and advance members of groups that had historically been excluded. For sixty years, the Office of Federal Contract Compliance Programs enforced this requirement across thousands of companies doing business with the federal government, making EO 11246 one of the most far-reaching instruments of civil rights policy in American history.\",\"The case for the order, as understood by those who built it, was that passive nondiscrimination was insufficient to undo the effects of active exclusion: if employers simply stopped discriminating but did nothing to recruit from pools they had previously ignored, the workforce would remain segregated by inertia. The case against it, as articulated by the originalist tradition, was that government requiring employers to make race-conscious decisions, even in service of integration, was itself a form of racial discrimination prohibited by the Equal Protection Clause and Title VII. The Supreme Court's 2023 *SFFA* decisions moved the law substantially toward the second view in the context of higher education. Executive Order 14173, which revoked EO 11246, applied the same logic to federal contractors, ending a six-decade program on the theory that it was, at bottom, illegal. Whether that theory is correct, and what follows from it for workforce integration, is among the most contested questions in contemporary civil rights law.\"],\"rights/crenforce\":[\"The Civil Rights Division of the Department of Justice, established by the Civil Rights Act of 1957, is the federal government's primary instrument for enforcing the civil rights statutes, investigating violations, bringing suits, and entering consent decrees with state and local governments and employers. Its mandate has always been partly a legal question (what do the statutes require?) and partly a political one (which violations are priority, and which theories of liability does the government embrace?). Enforcement posture shifts significantly between administrations, and those shifts are real: a Civil Rights Division that litigates aggressively against police departments enters a different set of decrees, produces different outcomes, and signals different things to both police and communities than one that does not.\",\"The legal theories behind these enforcement choices are themselves contested. Disparate-impact liability, the theory that practices with racially disproportionate effects can violate civil rights law even without discriminatory intent, has been the subject of thirty years of judicial and political contention. Reprioritizing enforcement toward intentional discrimination and colorblindness, and away from disparate-impact theory, is the application of one defensible legal tradition; maintaining and expanding disparate-impact enforcement is the application of another. The historical record shows that the division between these theories tracks the broader Bork-Dworkin split at the umbrella level: the originalist tradition is skeptical of disparate impact; the moral-reading tradition embraces it as the only way to address the patterns of exclusion that facially neutral practices can perpetuate.\"],\"rights/sexdef\":[\"The word \\\"sex\\\" in Title VII of the Civil Rights Act was added by Representative Howard Smith of Virginia, widely believed to have been attempting to sink the bill by making it absurd. The strategy failed, the bill passed, and the sex provision eventually became one of Title VII's most consequential elements. For decades it was understood to prohibit discrimination against women and men in employment; in 2020, the Supreme Court's decision in *Bostock v. Clayton County* held that it also prohibits discrimination against gay and transgender employees, on the theory that discriminating against someone because they are gay or transgender necessarily involves treating them differently because of their sex.\",\"Title IX of the Education Amendments of 1972 extended sex-discrimination prohibition to federally funded educational programs. Its most visible application has been in college athletics, the requirement that institutions provide substantially equal athletic opportunities to women and men, but its scope has been contested and expanded repeatedly since its passage, including to questions of sexual harassment and, in recent years, gender identity. The Biden administration's 2022 Title IX regulations expanded the statute's coverage to include gender identity; those regulations were challenged in court and blocked in significant part before taking effect. The current administration's binary-sex definition, established in executive orders and applied to passports, federal IDs, and Title IX interpretation, represents a return to the view that \\\"sex\\\" in federal law means biological sex, and that the *Bostock* ruling, whatever it holds for employment, does not extend to educational programs.\",\"These are contested legal interpretations of contested statutory terms. The corpus carries both without adopting either: the argument that *Bostock*'s logic extends throughout federal sex-discrimination law, and the argument that it is confined to employment under Title VII.\"],\"rights/transmil\":[\"Military service has been regulated by Congress and the executive with unusual latitude since the founding. The Supreme Court has consistently held that the judiciary should be particularly deferential to military judgments about readiness, cohesion, and fitness for service, a deference rooted in the recognition that military organizations operate under conditions that civilian institutions do not, and that courts are not well-positioned to second-guess professional military judgment. It was under this deference framework that the Court allowed the transgender service ban to take effect while the litigation proceeded.\",\"The substantive debate sits at the intersection of the sex-definition question (T3 above) and the medical-fitness question: is transgender identity a condition that affects military readiness, or is it irrelevant to service capacity? The Department of Defense's data from 2016–2018, when transgender service was permitted, and the arguments for and against the ban, are part of the Phase 2 change record rather than the historical spine. What the historical spine establishes is the legal framework: strong executive and congressional authority over military personnel, significant judicial deference in that domain, and the sex-discrimination framework that will govern any constitutional challenge.\"],\"rights/gac\":[\"The legal contest over gender-affirming care for minors turns on at least three distinct legal questions that are often conflated: whether prohibiting such care violates the Equal Protection Clause's prohibition on sex discrimination, whether it violates a substantive due process right of parents or patients to make medical decisions, and whether federal funding conditions can be used to pressure hospitals and states to restrict or provide it. Each question has its own doctrinal history and its own answer under the competing constitutional traditions.\",\"On the equal-protection question, the originalist tradition tends to read the Equal Protection Clause as prohibiting government from treating similarly situated people differently on the basis of a protected characteristic, and disputes whether gender identity is a protected characteristic at all, or whether restrictions on gender-affirming care discriminate on the basis of sex as *Bostock* would define it. The moral-reading tradition tends to say that a rule that restricts medical care specifically for people with gender dysphoria is facially a sex-based classification, and that restrictions of this kind require heightened justification that the government has not provided. The substantive due process question is still more contested, because the current Court has expressed skepticism of unenumerated substantive due process rights that lack a \\\"deeply rooted\\\" historical foundation. Whether the right of parents and patients to make medical decisions about minors' bodies qualifies under that framework is actively litigated.\"],\"rights/speech\":[\"The modern law of free speech in the United States was built largely in a series of cases decided during and after World War I, when the federal government prosecuted thousands of people for opposing the draft, criticizing the war, and organizing for labor and socialist causes. The Supreme Court's early decisions in those cases, approving prosecutions for speech that created a \\\"clear and present danger\\\", were later repudiated, but the jurisprudential framework that replaced them, established through the mid-twentieth century, is far more protective of dissent: speech cannot be punished merely because it is offensive, unpopular, or politically dangerous, but only if it is directed to inciting imminent lawless action and is likely to do so.\",\"Geoffrey Stone's history of free speech in American wartime identifies a recurring pattern: when the government perceives a security emergency, the temptation to suppress dissent intensifies; courts and civil society push back; and the outer limits of the First Amendment are redrawn. The speech suppressed in each era looks different from the outside, socialist agitation in 1917, Communist sympathy in the 1950s, antiwar protest in the 1960s, but the underlying legal question is consistent: at what point does the danger of the speech outweigh the constitutional commitment to open political debate? The current two-directional tension, an administration simultaneously claiming the mantle of free speech while using immigration enforcement against political protesters, produces exactly the kind of apparent contradiction that Stone's historical arc helps explain: administrations have often considered themselves defenders of free speech while suppressing speech they identified as dangerous.\",\"The doctrine governing government suppression of speech is fairly clear: content-based restrictions (restrictions targeting what is said) receive strict scrutiny and almost never survive; viewpoint discrimination (restrictions targeting one side of a debate) is especially disfavored and essentially always unconstitutional. The harder questions involve the application of these rules to specific mechanisms, whether removal proceedings constitute viewpoint-discriminatory punishment for speech, whether conditions on university funding amount to compelled speech, and what the First Amendment says about government pressure on private platforms.\"],\"rights/religion\":[\"The First Amendment's religion clauses pull in two directions at once. The Establishment Clause prohibits government from establishing a religion or preferring one religion over others, or, in the more expansive reading, preferring religion over nonreligion. The Free Exercise Clause prohibits government from restricting the practice of religion. For most of American history these two clauses were understood as complementary rather than contradictory: government stays neutral, neither supporting nor suppressing religious practice. The difficulty is that perfect neutrality is difficult to achieve in a country where religious practice is pervasive and government programs are equally pervasive, they keep running into each other.\",\"The current Court's approach to religious liberty has moved substantially from the neutrality principle toward something closer to accommodation: government must treat religious activity at least as favorably as comparable secular activity, and in some cases must affirmatively exempt religious actors from generally applicable laws. The 2022 decision in *Kennedy v. Bremerton School District*, allowing a public-school football coach to pray on the field after games, marked a significant shift from the *Lemon* test (which asked whether government action endorsed religion) toward a coercion-and-history test that is generally more permissive of religious expression in public settings.\",\"The Religious Freedom Restoration Act of 1993 operates at the statutory rather than constitutional level: it requires the federal government, before substantially burdening a person's exercise of religion, to demonstrate a compelling governmental interest pursued through the least restrictive means. RFRA has been the vehicle through which most conscience-protection claims against federal mandates have been litigated since its passage. It is the statutory spine for the Religious Liberty Commission's mandate and for the expanded conscience protections that follow from it.\"],\"rights/policing\":[\"Lawrence Friedman's history of American criminal justice identifies a persistent tension at the core of American policing: the demands of order and the demands of law are not always the same thing, and American institutions have always struggled to make police simultaneously effective enforcers of order and reliable respecters of constitutional limits. The reform movements of the twentieth century, from the Wickersham Commission's 1931 findings of widespread police brutality, through the Warren Court's constitutional limits on search and interrogation, through the post-civil-rights consent-decree era, each reflected a judgment that the balance had tipped too far toward order and not far enough toward law.\",\"The federal consent decree, as a mechanism, emerged in the 1990s: the Department of Justice's authority under 42 U.S.C. § 12601 to investigate police departments that engage in a \\\"pattern or practice\\\" of unconstitutional conduct, and to enter court-enforceable agreements specifying the reforms required. These decrees, covering departments in Los Angeles, New Orleans, Baltimore, Minneapolis, Louisville, and others, imposed monitoring requirements, training mandates, and changes to use-of-force policies, typically over periods of five to ten years. Critics argue they impose costly oversight on departments already operating under political and resource constraints; defenders argue they are the only mechanism that has produced sustained accountability reform in departments resistant to internal change. Both arguments have evidence behind them, and the policy choice between them is genuinely contested.\"],\"rights/capital\":[\"The federal death penalty exists in an unusual position in American law: the Constitution permits capital punishment (the Fifth Amendment explicitly contemplates it), but the Eighth Amendment limits how it may be administered, requiring, as the Supreme Court has progressively held, that it be applied only for the most serious crimes, that mitigating circumstances be considered, and that the method not amount to cruel and unusual punishment. The modern federal capital-punishment framework was constructed case by case from *Furman v. Georgia* (1972), which struck down all existing death-penalty statutes as arbitrarily applied, through *Gregg v. Georgia* (1976), which approved new statutes with guided-discretion procedures, through the Federal Death Penalty Act of 1994, which substantially expanded the list of federal capital offenses.\",\"The federal government has historically used the death penalty sparingly: from the reinstatement of the federal death penalty in the 1970s through the end of the Obama administration, federal executions occurred rarely and were subject to lengthy review. The Trump first term saw thirteen federal executions in 2020–2021, the most in a period since the 1930s. The second term lifted the moratorium and directed resumption of executions. Understanding these decisions requires knowing both the constitutional framework (which leaves significant discretion to the executive on the pace and scope of federal capital prosecution) and the policy tradition that had produced the moratorium in the first place.\"],\"rights/accused\":[\"The writ of habeas corpus, the legal mechanism by which a prisoner may challenge the lawfulness of their detention before a court, is old enough that the Constitution mentions it by name, in the Suspension Clause, which prohibits its suspension except \\\"in Cases of Rebellion or Invasion.\\\" It is not an American invention; it is inherited from English common law, where it was already ancient when the framers wrote. What it provides is a floor: before the government may hold a person, it must be able to justify the detention to a judge.\",\"The application of this protection to noncitizens, people who are not citizens but are present in the United States, has been contested throughout American history. The Supreme Court has held that noncitizens present in the country have some due process rights, including the right to notice and an opportunity to be heard before removal. The Alien Enemies Act of 1798, one of the oldest statutes in the United States Code, allows the president to detain and remove nationals of an enemy nation during a declared war or invasion. Its invocation in 2025, outside the context of a declared war, raised precisely the question the habeas corpus doctrine is designed to answer: does the government's assertion of authority to remove someone under this statute, whatever its merits, still require the individual to have notice and an opportunity to challenge it in court? The Supreme Court said yes.\"],\"rights/bodily\":[\"The constitutional right to reproductive autonomy was not discovered in the text of the Constitution; it was constructed by the Supreme Court across a series of decisions beginning in 1965. David Garrow's history of that construction traces the litigation strategy and the legal arguments from their origins: the challenge in *Griswold v. Connecticut* (1965) to a state law prohibiting contraception for married couples, which the Court struck down on the basis of a constitutionally protected \\\"right to privacy\\\" that the majority found in the \\\"penumbras\\\" and \\\"emanations\\\" of the Bill of Rights. The framework established in *Griswold* was extended in *Eisenstadt v. Baird* (1972) to unmarried couples, and then in *Roe v. Wade* (1973) to the decision to terminate a pregnancy, holding that the due process liberty interest included the right to make that decision, subject to increasing governmental interest as the pregnancy progressed.\",\"The *Roe* framework was modified in *Planned Parenthood v. Casey* (1992), which replaced the trimester structure with an \\\"undue burden\\\" standard, and then largely abandoned in *Dobbs v. Jackson Women's Health Organization* (2022), which overruled both *Roe* and *Casey* and returned the question of abortion regulation to the states. *Dobbs* was an application of the originalist tradition: the majority held that the right to abortion was not \\\"deeply rooted in this Nation's history and tradition\\\" and therefore did not qualify as a protected liberty under substantive due process. The dissent applied the moral-reading tradition: that the liberty interest in decisions about one's own body, and the equal protection interest in women's autonomy, required the opposite result.\",\"What remained after *Dobbs* was a set of questions about federal law: what obligations does the federal government have regarding abortion access through programs it funds (Title X, Medicaid, CMS), emergency medical treatment (EMTALA), and drug approval (the mifepristone question). Those questions, about the healthcare-program dimension, are addressed in `HEALTH-SPINE.md`. The constitutional-right dimension is here: the bodily-autonomy framework built in *Griswold* and the substantive due process doctrine that will determine the constitutional status of any future federal restrictions.\"]};\n\n  DATA = {\n    umbrellas: [\n      {\n        id:'borders', num:'02', name:'Borders & the world', status:'built',\n        statusNote:'The pilot vertical, fully carved to Tier 3 with historical spines drawn from a vetted 57-source corpus.',\n        gist:'The single largest concentration of change: a mass-deportation buildup, a pivot away from post-Cold War primacy toward restraint, tariffs wielded as coercion, and withdrawal from dozens of multilateral institutions.',\n        logic:'Framed as putting American sovereignty and citizens first and ending costly overreach abroad; critics see a retreat from alliances and strain on the rule of law.',\n        clusters:[\n          {title:'Immigration & border', blurb:'A declared \"largest domestic deportation operation,\" military at the border, $170.1B in enforcement funding via OBBBA, and a birthright-citizenship order.', status:'partial'},\n          {title:'Grand strategy & alliances', blurb:'The 2025 National Security Strategy halts NATO expansion and pushes Ukraine toward a settlement on current lines.', status:'announced'},\n          {title:'Economic statecraft', blurb:'IEEPA \"reciprocal\" tariffs struck down by the Supreme Court (Feb 2026), then re-imposed via Section 122.', status:'blocked'},\n          {title:'Foreign aid & soft power', blurb:'USAID dismantled and folded into State; ~$12.7B in global-health awards terminated.', status:'enacted'},\n          {title:'International institutions', blurb:'Day-one exits from WHO and Paris; by Jan 2026, withdrawal from 66 international organizations.', status:'enacted'},\n          {title:'Territorial expansionism', blurb:'Greenland, the Panama Canal, and Canada, with military force \"not ruled out.\"', status:'announced'}\n        ],\n        threads:[\n          {name:'The Venezuela campaign'},{name:'The Greenland gambit'},{name:'The China contest'},{name:'The Ukraine settlement'},{name:'Soft-power retrenchment'}\n        ],\n        tier2:[\n          {\n            id:'immig', code:'T2-1', name:'Immigration & border control', bridge:false,\n            scope:'Who enters and on what terms; enforcement at the border and in the interior. The highest change-weight in the umbrella.',\n            tier3:[\n              {\n                id:'enforce', name:'Enforcement & removal',\n                spine:[\n                  'The power to remove a person from the United States is older than the Constitution. The Alien Act of 1798 established a precedent that has never been fully superseded: the federal government possesses, in principle, the authority to expel noncitizens. Daniel Kanstroom\\u2019s history traces how this power was developed and expanded across two centuries, from the Chinese Exclusion Acts that first built a real machinery for removal, through the Palmer Raids and the mass deportations of the 1930s, to the deportation state that took its current form in the 1990s.',\n                  'What that history makes clear is that the current administration is not inventing the deportation state, but operating one that previous administrations built and expanded. The gap between who is theoretically removable (millions) and who is actually removed (hundreds of thousands per year) has always been a matter of prosecutorial priorities. The decision to treat that gap as an enforcement emergency rather than a policy equilibrium is the central choice that makes this change-set legible.'\n                ],\n                changes:[\n                  {t:'$170.1B in enforcement funding via the One Big Beautiful Bill Act', date:'Signed 2025-07-04', status:'enacted', mech:'Statute · OBBBA', agency:'DHS / ICE',\n                    summary:'The reconciliation bill appropriated a historic sum for detention capacity, removal operations, and border personnel, resourcing the declared \"largest domestic deportation operation\" through the enforcement apparatus built up over prior decades.',\n                    impact:'Supporters frame it as finally funding laws already on the books; critics warn the scale outruns due-process and detention-oversight capacity.',\n                    sources:[{label:'One Big Beautiful Bill Act (Congress.gov)', url:'https://www.congress.gov/'}],\n                    anchor:'Kanstroom, Deportation Nation'},\n                  {t:'Military deployed to \"seal the border\"; interior ICE buildup and detention expansion', status:'partial', mech:'Presidential action', agency:'DoD / DHS',\n                    summary:'Active-duty forces at the border and expanded interior ICE operations widened the enforcement footprint from the line into the interior.',\n                    impact:'Read by supporters as deterrence restored; by critics as the militarization of civil immigration enforcement.'},\n                  {t:'Border encounters fell sharply (~444k, FY2025)', status:'enacted', mech:'Outcome data', agency:'CBP',\n                    summary:'Southwest border encounters fell to roughly 444,000 in FY2025, among the lowest totals in years.',\n                    sources:[{label:'CBP Southwest Land Border Encounters', url:'https://www.cbp.gov/newsroom/stats/southwest-land-border-encounters'}]}\n                ],\n                crosslinks:['Homeland & Western Hemisphere mission','Power over the states (Govt & power)','The Venezuela campaign'],\n                refs:[{tag:'ANCHOR',text:'Kanstroom, Deportation Nation (Harvard, 2007)'},{tag:'ANCHOR',text:'Goodman, The Deportation Machine (Princeton, 2020)'},{tag:'BASELINE',text:'CRS interior-enforcement report [flagged]'}]\n              },\n              {\n                id:'status', name:'Legal status, protection & belonging',\n                spine:[\n                  'The question of who belongs has two legal dimensions that operate independently: immigration status (permission to be here) and citizenship (full membership). Birthright citizenship is embedded in the first sentence of the Fourteenth Amendment, written in 1868 to overturn Dred Scott. Whether it also makes citizens of children born to parents present without authorization is the legal question at the center of the current executive order.',\n                  'Schuck and Smith\\u2019s 1985 argument, that \"subject to the jurisdiction thereof\" was never meant to cover those whose primary allegiance is foreign, is the most serious foundation for the restrictive position; Motomura\\u2019s \"Americans in waiting\" is the counter-tradition. The asylum system is a separate dimension, grounded in the 1951 Refugee Convention and the 1980 Refugee Act. Bosniak frames the enduring tension: a liberal state committed both to universal dignity and to the bounded membership that makes a political community possible.'\n                ],\n                changes:[\n                  {t:'Executive order ending birthright citizenship for some U.S.-born children', date:'2025', status:'blocked', mech:'Executive order', agency:'DHS / State',\n                    summary:'An executive order directed agencies to withhold citizenship documentation from some U.S.-born children of parents without lawful status, testing the Fourteenth Amendment\\u2019s Citizenship Clause.',\n                    impact:'Restrictionists lean on Schuck & Smith\\u2019s reading of \"subject to the jurisdiction\"; the settled view since Wong Kim Ark (1898) treats birthright citizenship as near-absolute.',\n                    history:[{date:'2025-01-20', label:'Announced (EO signed)'},{date:'2025', label:'Blocked (multiple nationwide injunctions)'}],\n                    legal:[{docket:'Trump v. CASA', court:'U.S. Supreme Court', status:'injunction scope curtailed', url:'https://www.supremecourt.gov/'}],\n                    sources:[{label:'Executive order (Federal Register)', url:'https://www.federalregister.gov/presidential-documents/executive-orders'}],\n                    anchor:'Schuck & Smith / Motomura',\n                    links:[{node:'Due process & the accused (Rights & justice)', how:'the same citizenship question reaches individual status cases'}]},\n                  {t:'Asylum, parole, TPS and refugee-admission restrictions', status:'partial', mech:'Agency rulemaking', agency:'DHS / DOJ',\n                    summary:'Asylum access, humanitarian parole, TPS designations, and refugee admissions were narrowed across a series of actions.',\n                    impact:'Supporters cite control of a strained system; critics cite obligations under the 1980 Refugee Act and the 1951 Convention.'},\n                  {t:'Denaturalization priorities announced', status:'announced', mech:'DOJ policy', agency:'DOJ Civil Division',\n                    summary:'The Department signaled prioritization of civil denaturalization, a tool used sparingly in prior decades.'}\n                ],\n                crosslinks:['The courts standoff (Trump v. CASA)','Due process & the accused (Rights & justice)'],\n                refs:[{tag:'C',text:'Schuck & Smith, Citizenship Without Consent (Yale, 1985)'},{tag:'ANCHOR',text:'Motomura, Americans in Waiting (Oxford, 2006)'},{tag:'FRAME',text:'Bosniak, The Citizen and the Alien (Princeton, 2006)'}]\n              }\n            ]\n          },\n          {\n            id:'defense', code:'T2-2', name:'National defense & military posture', bridge:false,\n            scope:'The armed forces, force structure, and where the U.S. points its military. The heaviest spine load and the most editorially contested node.',\n            tier3:[\n              {\n                id:'strategy', name:'Strategy & global force posture',\n                spine:[\n                  'The United States emerged from World War II as the only major power with its industry intact, and it chose to stay, building the bases, alliances, and guarantees that define American posture to this day. John Lewis Gaddis\\u2019s core finding is humbling: the gap between strategy-on-paper and strategy-in-practice is large and predictable. The 2025 NSS and 2026 NDS are the newest entries in a tradition stretching back to NSC-68 in 1950.',\n                  'Robert Art\\u2019s map of the serious options (neo-isolationism, offshore balancing, selective engagement, cooperative security, primacy) locates the current move. The post-Cold War consensus was closest to primacy; the 2026 NDS\\u2019s homeland-and-Western-Hemisphere-first reordering slides toward selective engagement. Whether that is prudent consolidation or strategic retreat is the Phase-2 question; the spine establishes the baseline and the alternatives.'\n                ],\n                changes:[\n                  {t:'2026 National Defense Strategy reprioritizes to homeland + Western Hemisphere first, China second', status:'announced', mech:'Strategy document', agency:'DoD',\n                    summary:'The 2026 National Defense Strategy reordered priorities to the homeland and Western Hemisphere first and China second, sliding from post-Cold War primacy toward selective engagement.',\n                    impact:'One reading sees prudent consolidation of overstretched commitments; another sees a strategic retreat that invites testing by rivals.',\n                    sources:[{label:'National Defense Strategy (defense.gov)', url:'https://www.defense.gov/'}],\n                    anchor:'Gaddis / Art'},\n                  {t:'European drawdowns; force-structure and nuclear reprioritization', status:'partial', mech:'Force posture', agency:'DoD',\n                    summary:'Reductions in the European theater accompanied force-structure and nuclear reprioritization.'},\n                  {t:'Stops calling China a \"strategic competitor\"', status:'announced', mech:'Strategy document', agency:'White House / NSC',\n                    summary:'Official strategy dropped the \"strategic competitor\" label for China, a notable rhetorical shift.'}\n                ],\n                crosslinks:['The Ukraine settlement','Indo-Pacific & China deterrence'],\n                refs:[{tag:'ANCHOR',text:'Gaddis, Strategies of Containment (Oxford, 2005)'},{tag:'FRAME',text:'Art, A Grand Strategy for America (Cornell, 2003)'}]\n              },\n              {\n                id:'china', name:'Indo-Pacific & China deterrence',\n                spine:[\n                  'The United States has treated the Indo-Pacific as a strategic theater since Mahan argued that sea power determined great-power dominance. China\\u2019s trajectory is the central organizing fact. Allison\\u2019s \"Thucydides Trap,\" Doshi\\u2019s account of a deliberate CCP grand strategy, and Friedberg\\u2019s structural \"contest for supremacy\" are the three canonical frames, competitive readings the corpus names rather than adjudicates.',\n                  'The Taiwan Strait is where these analyses converge on a specific crisis. The Taiwan Relations Act of 1979 established the \"strategic ambiguity\" doctrine that has managed the tension for four decades and sits beneath every debate about arms sales and strait transits.'\n                ],\n                changes:[\n                  {t:'Continued Taiwan arms sales; South China Sea posture maintained', status:'enacted', mech:'Arms sales', agency:'State / DoD',\n                    summary:'Arms sales to Taiwan and South China Sea posture continued along the strategic-ambiguity line set by the 1979 Taiwan Relations Act.',\n                    anchor:'Doshi / Allison'},\n                  {t:'Chip export controls and the rare-earth tit-for-tat', status:'partial', mech:'Export controls', agency:'Commerce / BIS',\n                    summary:'Advanced-chip export controls were held and extended, met by Chinese rare-earth countermeasures at the opposite chokepoint.',\n                    sources:[{label:'Bureau of Industry and Security', url:'https://www.bis.doc.gov/'}],\n                    links:[{node:'Export controls & critical minerals', how:'the same chokepoint contest, economic-statecraft lens'}]},\n                  {t:'October 2025 US–China trade deal', status:'enacted', mech:'Bilateral agreement', agency:'USTR',\n                    summary:'An October 2025 trade deal paused parts of the escalating tariff-and-controls confrontation.'}\n                ],\n                crosslinks:['Export controls & critical minerals','The China contest'],\n                refs:[{tag:'FRAME',text:'Doshi, The Long Game (Oxford, 2021)'},{tag:'FRAME',text:'Allison, Destined for War (2017)'},{tag:'C',text:'Mearsheimer / offshore-balancing skepticism (named)'}]\n              },\n              {\n                id:'homeland', name:'Homeland & Western Hemisphere mission',\n                spine:[\n                  'The Monroe Doctrine is the oldest continuous principle of American foreign policy, and, as Jay Sexton shows, never a fixed principle but a political instrument reinterpreted by each generation. Lars Schoultz\\u2019s survey documents the long record of intervention it warranted; Greg Grandin\\u2019s \"empire\\u2019s workshop\" is the sharper critical reading. These two framings are the balance the corpus holds.',\n                  'The signature NDS reprioritization draws on this tradition of treating the hemisphere as a special sphere of responsibility: cartels designated as Foreign Terrorist Organizations, the Venezuela strike campaign, and an expanded Northern Command mission.'\n                ],\n                changes:[\n                  {t:'Mexican cartels designated Foreign Terrorist Organizations', status:'enacted', mech:'State designation', agency:'State Dept',\n                    summary:'Major Mexican cartels were designated Foreign Terrorist Organizations, extending counterterrorism authorities to hemispheric drug networks.',\n                    impact:'Backers see expanded tools against cartels; skeptics warn of mission cree
