document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r, orchestrator, and build tool.<\u002Fp>\n            <p style=\"font-size:16px;line-height:1.6;color:#5A574D;margin:0 0 32px;max-width:720px;\">This is not a finished cite, but it is a work in progress that I hope will eventually become a reliable tool for both policy-makers in Washington D.C. and the general public.<\u002Fp>\n            <div style=\"display:flex;gap:14px;flex-wrap:wrap;align-items:center;\">\n              <button onclick=\"{{ startReading }}\" style=\"background:#20201D;color:#F4F1E9;border:none;cursor:pointer;font-size:15px;font-weight:600;padding:14px 26px;transition:background .3s ease,transform .3s ease;\" style-hover=\"background:#A9741F;transform:translateY(-2px);\">Enter the tracker →<\u002Fbutton>\n              <button onclick=\"{{ goProcess }}\" style=\"background:none;color:#20201D;border:none;cursor:pointer;font-size:15px;font-weight:600;padding:14px 6px;border-bottom:1.5px solid rgba(32,32,29,.25);transition:border-color .3s ease;\" style-hover=\"border-color:#A9741F;\">How I used Claude to build it<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- what exists -->\n        <section style=\"border-top:1px solid rgba(32,32,29,.12);border-bottom:1px solid rgba(32,32,29,.12);background:rgba(251,249,244,.5);\">\n          <div style=\"max-width:1180px;margin:0 auto;padding:38px 32px;display:grid;grid-template-columns:auto auto auto auto;gap:52px;align-items:baseline;\">\n            <div>\n              <div style=\"font-family:'Newsreader',serif;font-size:40px;color:#20201D;line-height:1;\">5<\u002Fdiv>\n              <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:#8A867C;text-transform:uppercase;margin-top:8px;line-height:1.5;\">policy umbrellas,<br>tiered &amp; locked<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Newsreader',serif;font-size:40px;color:#20201D;line-height:1;\">61<\u0  style=\"width:9px;height:9px;border-radius:50%;background:{{ u.statusColor }};\"><\u002Fspan>\n                <span style=\"font-weight:600;font-size:15px;color:#20201D;\">{{ u.statusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size:13.5px;line-height:1.55;color:#5A574D;margin:0;\">{{ u.statusNote }}<\u002Fp>\n            <\u002Fdiv>\n            <sc-if value=\"{{ showThreads }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"border:1px solid rgba(32,32,29,.14);padding:22px;\">\n              <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8A867C;text-transform:uppercase;margin-bottom:14px;\">Reading Threads<\u002Fdiv>\n              <p style=\"font-size:13px;line-height:1.5;color:#5A574D;margin:0 0 14px;\">Named episodes assembled across nodes, how the levers were used together.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <sc-for list=\"{{ u.threads }}\" as=\"th\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ goThreads }}\" style=\"text-align:left;background:rgba(169,116,31,.08);border:none;cursor:pointer;padding:10px 12px;font-size:13.5px;font-weight:600;color:#20201D;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:background .25s ease;\" style-hover=\"background:rgba(169,116,31,.16);\">{{ th.name }} <span style=\"color:#A9741F;\">↗<\u002Fspan><\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv><\u002Fsc-if>\n          <\u002Faside>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= NODE (TIER 3 · DEEPEST) ================= -->\n    <sc-if value=\"{{ isNode }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Node\" style=\"max-width:1180px;margin:0 auto;padding:52px 32px 90px;\">\n        <div style=\"display:grid;grid-template-columns:260px 1fr;gap:52px;align-items:start;\">\n          <!-- node switcher -->\n          <aside style=\"position:sticky;top:130px;\">\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.1em;color:#A9741F;margin-bottom:6px;\">{{ t2.code }} · TIER 2<\u002Fdiv>\n            <div style=\"font-family:'Newsreader',serif;font-weight:500;font-size:21px;color:#20201D;line-height:1.2;margin-bottom:20px;\">{{ t2.name }}<\u002Fdiv>\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8A867C;text-transform:uppercase;margin-bottom:12px;\">Tier-3 Nodes<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:2px;\">\n              <sc-for list=\"{{ t2.tier3 }}\" as=\"n\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ n.open }}\" style=\"text-align:left;background:{{ n.bg }};border:none;border-left:2px solid {{ n.bar }};cursor:pointer;padding:12px 14px;font-size:14px;font-weight:{{ n.weight }};color:{{ n.color }};line-height:1.35;transition:background .22s ease;\">{{ n.name }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Faside>\n\n          <!-- node detail -->\n          <div>\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.1em;color:#A9741F;margin-bottom:12px;\">TIER 3 · NODE<\u002Fdiv>\n            <h1 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:38px;line-height:1.12;letter-spacing:-.01em;color:#20201D;margin:0 0 30px;\">{{ node.name }}<\u002Fh1>\n\n            <!-- historical spine -->\n            <div style=\"margin-bottom:44px;\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\">\n                <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Historical Spine<\u002Fspan>\n                <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n                <span style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;color:#8A867C;\">the durable baseline<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ node.hasSpine }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-family:'Newsreader',serif;\">\n                  <sc-for list=\"{{ node.spine }}\" as=\"p\" hint-placeholder-count=\"3\">\n                    <p style=\"font-size:18px;line-height:1.68;color:#33322C;margin:0 0 20px;\">{{ p }}<\u002Fp>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ node.noSpine }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"border:1px dashed rgba(32,32,29,.28);padding:26px 28px;background:rgba(251,249,244,.5);\">\n                  <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8A867C;text-transform:uppercase;margin-bottom:10px;\">Structure Locked · Spine In Research<\u002Fdiv>\n                  <p style=\"font-size:15.5px;line-height:1.6;color:#5A574D;margin:0;font-family:'Newsreader',serif;\">The category tree for this umbrella is locked, but its historical spine, the even-handed pre-2025 baseline a reader needs to understand why the change matters, is still being assembled through the source funnel. <span style=\"color:#20201D;\">Borders &amp; the world<\u002Fspan> is the built-out pilot: open it to see a fully spined node.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- change record -->\n            <div style=\"margin-bottom:44px;\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n                <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">What's Shifting<\u002Fspan>\n                <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n                <span style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;color:#8A867C;\">the change record · legal status tracked<\u002Fspan>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ showStatus }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;\">\n                <sc-for list=\"{{ statusLegend }}\" as=\"sl\" hint-placeholder-count=\"5\">\n                  <span style=\"display:flex;align-items:center;gap:6px;font-family:'Spline Sans Mono',monospace;font-size:10px;color:{{ sl.color }};\">{{ sl.label }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv><\u002Fsc-if>\n\n              <div style=\"display:flex;flex-direction:column;gap:1px;background:rgba(32,32,29,.1);border:1px solid rgba(32,32,29,.1);\">\n                <sc-for list=\"{{ node.changes }}\" as=\"ch\" hint-placeholder-count=\"3\">\n                  <div style=\"background:#FBF9F4;\">\n\n                    <!-- collapsed row -->\n                    <button onclick=\"{{ ch.toggle }}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:{{ ch.cursor }};padding:16px 20px;display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:start;\">\n                      <span>\n                        <span style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;\">\n                          <sc-if value=\"{{ ch.hasMech }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'Spline Sans Mono',monospace;font-size:9px;letter-spacing:.06em;color:#4A4842;text-transform:uppercase;\">{{ ch.mech }}<\u002Fspan><\u002Fsc-if>\n                          <sc-if value=\"{{ ch.noAnchor }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'Spline Sans Mono',monospace;font-size:9px;letter-spacing:.06em;color:#9C5A42;text-transform:uppercase;\">No Corpus Anchor<\u002Fspan><\u002Fsc-if>\n                        <\u002Fspan>\n                        <span style=\"display:block;font-size:15px;line-height:1.5;color:#33322C;\">{{ ch.t }}<\u002Fspan>\n                        <span style=\"display:flex;gap:10px;margin-top:5px;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#8A867C;\">\n                          <sc-if value=\"{{ ch.date }}\" hint-placeholder-val=\"{{ false }}\"><span>{{ ch.date }}<\u002Fspan><\u002Fsc-if>\n                          <sc-if value=\"{{ ch.agency }}\" hint-placeholder-val=\"{{ false }}\"><span>· {{ ch.agency }}<\u002Fspan><\u002Fsc-if>\n                        <\u002Fspan>\n                      <\u002Fspan>\n                      <sc-if value=\"{{ showStatus }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.04em;color:{{ ch.stColor }};text-transform:uppercase;white-space:nowrap;\">{{ ch.stLabel }}<\u002Fspan><\u002Fsc-if>\n                      <span style=\"color:#A9741F;font-size:13px;padding-top:3px;width:14px;text-align:right;\">{{ ch.toggleIcon }}<\u002Fspan>\n                    <\u002Fbutton>\n\n                    <!-- expanded detail -->\n                    <sc-if value=\"{{ ch.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"padding:4px 20px 22px 20px;border-top:1px solid rgba(32,32,29,.08);\">\n                        <sc-if value=\"{{ ch.hasSummary }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:14.5px;line-height:1.6;color:#4A4842;margin:14px 0;max-width:640px;\">{{ ch.summary }}<\u002Fp><\u002Fsc-if>\n\n                        <sc-if value=\"{{ ch.hasHistory }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"margin-bottom:16px;\">\n                            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:9.5px;letter-spacing:.1em;color:#8A867C;text-transform:uppercase;margin-bottom:8px;\">Status History<\u002Fdiv>\n                            <div style=\"display:flex;flex-direction:column;gap:5px;\">\n                              <sc-for list=\"{{ ch.statusHistory }}\" as=\"sh\" hint-placeholder-count=\"2\">\n                                <span style=\"font-size:12.5px;color:#5A574D;\"><span style=\"font-family:'Spline Sans Mono',monospace;color:#8A867C;\">{{ sh.date }}<\u002Fspan> · {{ sh.label }}<\u002Fspan>\n                              <\u002Fsc-for>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n\n                        <sc-if value=\"{{ ch.hasImpact }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-bottom:16px;padding:14px 16px;background:rgba(251,249,244,.7);border-left:2px solid #A9741F;\">\n                          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:9px;letter-spacing:.1em;color:#A9741F;margin-bottom:6px;\">RANGE OF VIEWS, NOT A VERDICT<\u002Fdiv>\n                          <p style=\"font-size:13.5px;line-height:1.55;color:#5A574D;margin:0;font-style:italic;font-family:'Newsreader',serif;\">{{ ch.impact }}<\u002Fp>\n                        <\u002Fdiv><\u002Fsc-if>\n\n                        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n                          <sc-if value=\"{{ ch.hasSources }}\" hint-placeholder-val=\"{{ false }}\">\n                            <div>\n                              <div style=\"font-family:'Spline Sans Mono',monospace;font-size:9.5px;letter-spacing:.1em;color:#8A867C;text-transform:uppercase;margin-bottom:8px;\">Primary Sources<\u002Fdiv>\n                              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                                <sc-for list=\"{{ ch.sources }}\" as=\"src\" hint-placeholder-count=\"2\">\n                                  <a href=\"{{ src.url }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13px;color:#20201D;text-decoration:underline;text-decoration-color:rgba(32,32,29,.3);\">{{ src.label }}<\u002Fa>\n                                <\u002Fsc-for>\n                              <\u002Fdiv>\n                            <\u002Fdiv>\n                          <\u002Fsc-if>\n                          <sc-if value=\"{{ ch.hasLegal }}\" hint-placeholder-val=\"{{ false }}\">\n                            <div>\n                              <div style=\"font-family:'Spline Sans Mono',monospace;font-size:9.5px;letter-spacing:.1em;color:#8A867C;text-transform:uppercase;margin-bottom:8px;\">Legal Challenges<\u002Fdiv>\n                              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                                <sc-for list=\"{{ ch.legal }}\" as=\"lg\" hint-placeholder-count=\"1\">\n                                  <a href=\"{{ lg.url }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13px;color:#20201D;\">{{ lg.docket }} <span style=\"color:#8A867C;\">({{ lg.court }}, {{ lg.status }})<\u002Fspan><\u002Fa>\n                                <\u002Fsc-for>\n                              <\u002Fdiv>\n                            <\u002Fdiv>\n                          <\u002Fsc-if>\n                        <\u002Fdiv>\n\n                        <sc-if value=\"{{ ch.hasLinks }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"margin-top:16px;\">\n                            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:9.5px;letter-spacing:.1em;color:#8A867C;text-transform:uppercase;margin-bottom:8px;\">Connects To<\u002Fdiv>\n                            <sc-for list=\"{{ ch.crossLinks }}\" as=\"cl\" hint-placeholder-count=\"2\">\n                              <p style=\"font-size:12.5px;line-height:1.5;color:#5A574D;margin:0 0 4px;\"><span style=\"color:#20201D;font-weight:600;\">{{ cl.node }}<\u002Fspan> · {{ cl.how }}<\u002Fp>\n                            <\u002Fsc-for>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n\n                        <div style=\"margin-top:14px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:#8A867C;\">\n                          <sc-if value=\"{{ ch.hasAnchor }}\" hint-placeholder-val=\"{{ false }}\"><span>Read through: {{ ch.anchor }}<\u002Fspan><\u002Fsc-if>\n                          <span>Verified {{ ch.verified }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <p style=\"font-size:12.5px;line-height:1.5;color:#8A867C;margin:12px 0 0;font-style:italic;\">Contested impacts are presented as a range of views, not a verdict. Legal status shifts weekly and is re-verified at interpretation time.<\u002Fp>\n            <\u002Fdiv>\n\n            <!-- crosslinks + sources -->\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:38px;\">\n              <div>\n                <div style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;margin-bottom:16px;\">Cross-Links<\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n                  <sc-for list=\"{{ node.crosslinks }}\" as=\"cl\" hint-placeholder-count=\"3\">\n                    <span style=\"font-size:13px;padding:7px 12px;color:#4A4842;\">{{ cl }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;margin-bottom:16px;\">Anchors &amp; Sources<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:12px;\">\n                  <sc-for list=\"{{ node.refs }}\" as=\"r\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;gap:10px;align-items:baseline;\">\n                      <span style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;color:#A9741F;flex:none;\">{{ r.tag }}<\u002Fspan>\n                      <span style=\"font-size:13.5px;line-height:1.45;color:#4A4842;\">{{ r.text }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= THREADS ================= -->\n    <sc-if value=\"{{ isThreads }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Threads\" style=\"max-width:1180px;margin:0 auto;padding:56px 32px 90px;\">\n        <div style=\"max-width:720px;margin-bottom:44px;\">\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.14em;color:#A9741F;text-transform:uppercase;margin-bottom:16px;\">A Second Lens<\u002Fdiv>\n          <h1 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:44px;line-height:1.1;color:#20201D;margin:0 0 18px;\">Reading Threads<\u002Fh1>\n          <p style=\"font-size:18px;line-height:1.6;color:#4A4842;margin:0 0 14px;\">The tree is how the record is <em>filed<\u002Fem>; a thread is how it's <em>read<\u002Fem>. Each thread is a named episode assembled from the same change records, showing how several instruments were applied to one goal, something a flat tracker can't do.<\u002Fp>\n          <p style=\"font-size:14px;line-height:1.55;color:#8A867C;margin:0;font-style:italic;\">Guardrail: a thread describes instruments used together on a target. It never asserts a single coordinated master-plan or attributes unified intent; the \"why\" comes from stated rationale and a range of analyst readings.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(32,32,29,.12);border:1px solid rgba(32,32,29,.12);\">\n          <sc-for list=\"{{ allThreads }}\" as=\"th\" hint-placeholder-count=\"6\">\n            <div style=\"background:#FBF9F4;padding:28px 28px;display:flex;flex-direction:column;gap:14px;\">\n              <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.1em;color:#A9741F;text-transform:uppercase;\">{{ th.umbrella }}<\u002Fdiv>\n              <h3 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:22px;color:#20201D;margin:0;\">{{ th.name }}<\u002Fh3>\n              <p style=\"font-size:14.5px;line-height:1.55;color:#5A574D;margin:0;\">{{ th.blurb }}<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;padding-top:8px;\">\n                <sc-for list=\"{{ th.nodes }}\" as=\"nd\" hint-placeholder-count=\"3\">\n                  <span style=\"font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:#4A4842;\">{{ nd }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= METHODOLOGY ================= -->\n    <sc-if value=\"{{ isMethod }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Methodology\" style=\"max-width:1180px;margin:0 auto;padding:56px 32px 90px;\">\n        <div style=\"max-width:720px;margin-bottom:52px;\">\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:.14em;color:#A9741F;text-transform:uppercase;margin-bottom:16px;\">The Trust Layer<\u002Fdiv>\n          <h1 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:46px;line-height:1.08;color:#20201D;margin:0 0 18px;\">How This Works, And Why You Can Trust It.<\u002Fh1>\n          <p style=\"font-size:18.5px;line-height:1.6;color:#4A4842;margin:0;\">On contested ground, trust comes from transparent method, not confident tone. Here is exactly where the material comes from, how sources are chosen, and how outputs are checked.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;margin-bottom:52px;\">\n          <div style=\"border:1px solid rgba(32,32,29,.14);padding:30px 30px;background:#FBF9F4;\">\n            <div style=\"font-family:'Newsreader',serif;font-size:15px;color:#A9741F;margin-bottom:10px;\">Layer 1<\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:23px;color:#20201D;margin:0 0 12px;\">The Historical Foundation<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.6;color:#5A574D;margin:0;\">The durable background, how the government and its agencies actually work, drawn from vetted, even-handed scholarship. Slow to change. It gives the tool the depth to explain <em>why<\u002Fem> a change matters, not just that it happened. Books are cited bibliographically, never ingested.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(32,32,29,.14);padding:30px 30px;background:#FBF9F4;\">\n            <div style=\"font-family:'Newsreader',serif;font-size:15px;color:#A9741F;margin-bottom:10px;\">Layer 2<\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:23px;color:#20201D;margin:0 0 12px;\">The Living Change Record<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.6;color:#5A574D;margin:0;\">The executive orders, rule changes, and actions since January 2025, each tied to a primary document (Federal Register, court dockets, agency announcements) and carrying a legal-status field: announced / enacted / partial / blocked / reversed. Dated absolutely; stale data is treated as misinformation.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- the funnel -->\n        <div style=\"margin-bottom:52px;\">\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:30px;color:#20201D;margin:0 0 8px;\">The Source Funnel<\u002Fh2>\n          <p style=\"font-size:15px;line-height:1.6;color:#5A574D;margin:0 0 26px;max-width:640px;\">How each umbrella's vetted \"set list\" of sources is built. The corpus is closed but monitored: when a change can't be contextualized from it, that's flagged and the funnel is re-run; the tool never reaches outside the approved list.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:1px;background:rgba(32,32,29,.12);border:1px solid rgba(32,32,29,.12);\">\n            <sc-for list=\"{{ funnel }}\" as=\"f\" hint-placeholder-count=\"6\">\n              <div style=\"background:#FBF9F4;padding:20px 24px;display:grid;grid-template-columns:70px 220px 1fr;gap:20px;align-items:baseline;\">\n                <span style=\"font-family:'Spline Sans Mono',monospace;font-size:12px;color:#A9741F;\">{{ f.step }}<\u002Fspan>\n                <span style=\"font-weight:600;font-size:15.5px;color:#20201D;\">{{ f.name }}<\u002Fspan>\n                <span style=\"font-size:14px;line-height:1.5;color:#5A574D;\">{{ f.desc }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- verification + evenhandedness -->\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;margin-bottom:20px;\">\n          <div style=\"background:#20201D;color:#F4F1E9;padding:34px 34px;\">\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.14em;color:#C79A4E;text-transform:uppercase;margin-bottom:14px;\">Verification Gate · AI Checks AI<\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:23px;color:#fff;margin:0 0 12px;\">A second pass audits the first.<\u002Fh3>\n            <p style=\"font-size:14.5px;line-height:1.6;color:#B8B2A5;margin:0 0 14px;\">Before a corpus is shown, an independent pass checks coverage, balance, citation integrity (every source real, every link resolving), and provenance, producing a PASS / NEEDS-WORK report with each gap named.<\u002Fp>\n            <p style=\"font-size:13px;line-height:1.55;color:#8F897D;margin:0;font-style:italic;\">Stated honestly: AI verification reduces but does not eliminate error. It is paired with human review and a public corrections log.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(32,32,29,.14);padding:34px 34px;\">\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.14em;color:#A9741F;text-transform:uppercase;margin-bottom:14px;\">Even-Handedness<\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:23px;color:#20201D;margin:0 0 12px;\">A range of views, never a verdict.<\u002Fh3>\n            <p style=\"font-size:14.5px;line-height:1.6;color:#5A574D;margin:0 0 14px;\">Where impact is genuinely contested, the strongest version of each major tradition is represented and its leaning is named, guarding against both one-sidedness and manufactured balance.<\u002Fp>\n            <p style=\"font-size:14.5px;line-height:1.6;color:#5A574D;margin:0;\">What was <em>announced<\u002Fem> is kept distinct from what was <em>enacted<\u002Fem> or <em>blocked<\u002Fem>. Corrections and versions are logged in the open.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= PROCESS · HOW I USED CLAUDE ================= -->\n    <sc-if value=\"{{ isProcess }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Process\" style=\"max-width:800px;margin:0 auto;padding:56px 32px 90px;\">\n        <div style=\"margin-bottom:46px;padding-bottom:30px;border-bottom:1px solid rgba(32,32,29,.14);\">\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A867C;text-transform:uppercase;margin-bottom:16px;\">Federal Change Tracker · Process Notes<\u002Fdiv>\n          <h1 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:44px;line-height:1.12;color:#20201D;margin:0 0 18px;\">How I Used Claude to Build This <span style=\"font-style:italic;color:#77746A;\">(So Far)<\u002Fspan><\u002Fh1>\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:12.5px;color:#8A867C;line-height:1.9;\">Elijah Suwyn · self-taught, working alone · June 18 – July 5, 2026 (2.5 weeks)<br><span style=\"color:#A9741F;\">Status: research &amp; planning phase done, live site not yet built<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <p style=\"font-family:'Newsreader',serif;font-size:20px;line-height:1.6;color:#20201D;margin:0 0 28px;\">This is an account of the technical skills I built over two and a half weeks getting Claude to do real, verifiable work on a large, adversarial-by-nature research problem, not a project pitch. I'd never used Claude at this scale before. Everything below was learned by shipping it.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:34px;margin:0 0 28px;padding:22px 0;border-top:1px solid rgba(32,32,29,.12);border-bottom:1px solid rgba(32,32,29,.12);\">\n          <div><div style=\"font-family:'Newsreader',serif;font-size:30px;color:#20201D;line-height:1;\">61<\u002Fdiv><div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.05em;color:#8A867C;text-transform:uppercase;margin-top:7px;line-height:1.45;\">structured records built &amp; audited<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Newsreader',serif;font-size:30px;color:#20201D;line-height:1;\">7<\u002Fdiv><div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.05em;color:#8A867C;text-transform:uppercase;margin-top:7px;line-height:1.45;\">task templates, 2 model providers<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Newsreader',serif;font-size:30px;color:#20201D;line-height:1;\">4+7<\u002Fdiv><div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.05em;color:#8A867C;text-transform:uppercase;margin-top:7px;line-height:1.45;\">gate tests / audit checks enforced<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Newsreader',serif;font-size:30px;color:#20201D;line-height:1;\">5<\u002Fdiv><div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.05em;color:#8A867C;text-transform:uppercase;margin-top:7px;line-height:1.45;\">gov’t APIs mapped field-by-field<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border-left:2px dashed #9C5A42;padding:6px 0 6px 20px;margin:0 0 44px;\">\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.08em;color:#9C5A42;text-transform:uppercase;margin-bottom:8px;\">Scope, honestly<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.62;color:#5A574D;margin:0;\">This is a finished research-and-systems-design phase, not a finished website: there's no live site yet, and Phase 2 (turning primary documents into published change records) is fully designed but hasn't run against real documents. The skills below are what it took to get the foundation to this point; the “what's next” section at the bottom is what's left.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Persistent instruction design across sessions<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 18px;\">The skill here isn't prompting; it's treating the project itself as something Claude has to be configured for, the same way you'd configure a build system. Before doing any research, I wrote <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">CLAUDE.md<\u002Fspan> as a standing instruction file: a phased workflow Claude has to enforce on itself (Brainstorm → Refine → Plan, no skipping to architecture before scope is locked), non-negotiable domain guardrails written as rules rather than reminders (source everything, separate announced / enacted / blocked, dates always absolute), and output conventions that hold across every session regardless of who starts the conversation.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\"><span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">DECISIONS.md<\u002Fspan> is the companion piece: a numbered decision log (D1, D2, D2-revised, D3…) where every locked call carries its own reasoning and downstream implications, so later sessions can check a decision instead of re-deriving or accidentally contradicting it. When a decision needed to change, I wrote the supersession explicitly, old reasoning left visible, new entry stating what changed and why, rather than editing history; the log has to stay auditable, not just current.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Anti-hallucination architecture, not just instructions<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 18px;\">Telling a model “don't make things up” doesn't hold at scale. I built a <strong style=\"color:#20201D;\">closed-corpus rule<\u002Fstrong> as an actual constraint: Claude may only interpret a change through the specific vetted source set built for that node, full stop. When nothing in the corpus fits, the method requires an explicit <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">[NO CORPUS ANCHOR]<\u002Fspan> flag instead of a plausible-sounding reach; the failure mode has to be visible, not silent.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 18px;\">Every source has to clear a four-gate test (reputable, durable, traceable, named-leaning-or-neutral) before it's admitted, and every finished corpus has to pass a blocking seven-check audit (node-type coverage, change-mass coverage, balance, gate compliance, citation integrity, provenance completeness, anti-bloat), run as a genuinely separate pass from the one that built the corpus. A model auditing its own output is not a check; I treated “who verifies” as a design decision, not an afterthought.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">The same discipline extends into the schema: every field in the 16-field change-record structure is tied to a specific, citable government source, Federal Register for the document, eCFR to confirm text actually changed versus merely being proposed, Regulations.gov for docket status history, CourtListener for litigation outcomes. Reporting can help locate a primary document; it is never permitted to be the citation itself.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Prompt engineering: structured output over free text<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 18px;\">The mechanical research work (checking a source's academic convergence, verifying a URL, formatting a citation) got delegated to cheaper worker models through a script I wrote, <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">delegate.py<\u002Fspan>. The real engineering there is in how each task is specified: seven distinct task types (<span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">source_lookup<\u002Fspan>, <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">convergence_check<\u002Fspan>, <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">url_verify<\u002Fspan>, <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">counter_anchor_search<\u002Fspan>, <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">format_corpus_row<\u002Fspan>, <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">balance_audit<\u002Fspan>, <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">t3_anchor_search<\u002Fspan>), each with its own system prompt, a strict JSON <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">output_schema<\u002Fspan>, and a required per-item confidence field, enforced through the API's <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">response_format: json_object<\u002Fspan> rather than hoped for from free text.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">Every system prompt carries some version of the same clause: if you're not confident a URL or citation is real, omit it and flag it, don't guess. Temperature is locked to 0.1 across every worker call, because the job is deterministic extraction and verification, not creative variation, a setting most people never touch, chosen deliberately here. And the validation layer doesn't fully trust a worker's own self-report: any item a worker marks “low confidence” gets auto-escalated into the flag list regardless of what the worker itself concluded, and the whole result is marked <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">NEEDS_OPUS_REVIEW<\u002Fspan> if anything is flagged. The worker's opinion of its own output is data, not the final word.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Model routing across providers, by task shape<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">Rather than running every task on one model, I matched model capability to task difficulty. Purely mechanical checks (does this URL resolve, format this citation as a table row) route to a small fast model (Llama 3.1 8B via Groq); tasks that require actual judgment (does this source show real academic convergence, does this set have a balance gap) route to a larger model (Llama 3.3 70B). Source-<em>finding<\u002Fem> tasks route to a different provider entirely: a Z.ai model with a real, server-managed web-search tool doing grounded retrieval, because a model guessing citations from training data and a model actually searching the live web are not interchangeable for a job where “does this source exist” is the whole question.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Orchestration: Claude directing a small AI team<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 18px;\">I wrote down the orchestrator's own operating rules in <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">ORCHESTRATOR-PROMPT.md<\u002Fspan> rather than re-deriving them each session, most importantly an explicit list of what never gets delegated: diagnosing a node's underlying structure, judging whether balance is real or manufactured, writing provenance notes, any call where a wrong worker answer would corrupt the output silently. Workers write full results to disk and return only a compact <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">AUTO_PASS<\u002Fspan> / <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">NEEDS_OPUS_REVIEW<\u002Fspan> summary; Claude reads flagged items in full and never touches raw worker output otherwise, which is what kept the orchestrator's own context usable across a long run instead of drowning in intermediate output. A worker still wrong after two retries gets escalated to Claude's own judgment, not a third automated attempt. None of this was improvised mid-session; I read an external workflow-design writeup on checkpointing and model-to-task routing first and built the rules to match it, then tightened them once real runs exposed gaps.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">This ran for real, not just on paper: a depth-expansion pass on the Borders corpus has working batch files (<span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">_source-discovery-working/borders-batch1-vetted.md<\u002Fspan> and others) where worker-sourced candidates come back tagged for a citation fix or a balance gap, with Claude's own resolution recorded inline before anything gets compiled into the corpus that actually ships.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Recursive decomposition as a repeatable algorithm<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">Organizing five sprawling policy areas into a navigable tree isn't one editorial judgment call; I turned it into a repeatable procedure: split a node, diagnose its type (single-trunk / inheriting / distinct-spines / institution sub-tree), size its research effort to that type via an explicit lean-count rule, then recurse until a stated base case (one coherent spine, one bounded change-set). The same subroutine runs at Tier 1, Tier 2, and Tier 3, which is why the fourth and fifth policy area took a fraction of the first one's time: the procedure, not the topic knowledge, was the reusable part.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Schema design, translated into a real automation<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">The 16-field change-record schema isn't just a spec, it's built to run: single-select fields map onto Airtable's controlled-vocabulary types, related tables (<span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">Nodes<\u002Fspan>, eventually <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">Sources<\u002Fspan>) avoid duplicating tree data across records, and the weekly update job is designed as an explicit state machine: fetch → match against existing record IDs (by docket, EO number, or agency+keyword) → classify by mechanism → route to auto-publish or a human review queue. I also designed around a platform constraint before hitting it in production: Airtable automations cap around 50 fetch calls per run, so the plan already accounts for splitting the job per policy area if real call volume requires it, rather than discovering the ceiling mid-build.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">Designing guardrails for a contested domain<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">Every generation rule exists to stop an AI-written sentence from reading as a verdict. Impact is presented as a range of views, never a conclusion. A “thread” connecting several actions toward one target may describe instruments used together; it may never assert a coordinated master plan, because that's an intent claim the sources don't support. Balance audits name each source's leaning explicitly and treat “false balance” (a weak source added only for symmetry) as its own distinct failure mode. Even status colors avoid red/green stoplight semantics, because that reads as a verdict and this system isn't supposed to render one.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">What I’d do differently<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">Early on, I ran batches of three worker agents per round to move faster on corpus expansion. It worked, but it burned through usage faster than the quality gain justified; the mechanical lookups didn't need that much parallel firepower. I caught it by actually looking at cost versus output, not by being told, and rewrote the method around a different default: direct research in the main conversation, node by node, with delegation reserved for a whole node handed off with a complete, self-contained brief, only when volume genuinely warrants it. That's the standing rule in <span style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8A867C;background:rgba(32,32,29,.05);padding:1px 6px;\">CHANGE-RECORD-METHOD.md<\u002Fspan> now, not a one-time fix.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.12em;color:#20201D;text-transform:uppercase;\">What’s next<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(32,32,29,.14);\"><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.68;color:#4A4842;margin:0 0 40px;\">Stand up the Airtable base and its views; write and test the closed-corpus drafting prompt against real primary documents instead of the abstract method; run the first real Phase-2 pass on the Borders pilot's strongest node; build the human review queue that gates generated prose before it publishes; repeat across the remaining four policy areas; wire up the weekly automation.<\u002Fp>\n        <div style=\"padding-top:26px;border-top:1px solid rgba(32,32,29,.14);display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;\">\n          <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:17px;line-height:1.5;color:#20201D;margin:0;max-width:520px;\">The site isn't live yet. The reasoning it will run on is built, tested, and written down, and I know exactly what's left.<\u002Fp>\n          <button onclick=\"{{ startReading }}\" style=\"background:#20201D;color:#F4F1E9;border:none;cursor:pointer;font-size:14px;font-weight:600;padding:12px 22px;white-space:nowrap;transition:background .3s ease;\" style-hover=\"background:#A9741F;\">Enter the tracker →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"border-top:1px solid rgba(32,32,29,.14);background:rgba(251,249,244,.5);\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:40px 32px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;\">\n      <div style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;color:#8A867C;line-height:1.6;max-width:520px;\">\n        <span style=\"color:#20201D;\">The Federal Change Tracker<\u002Fspan>, a record of changes to the U.S. federal government since Jan 20, 2025. Prototype · Borders &amp; the world built to Tier 3; other umbrellas structure-locked.\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:18px;\">\n        <button onclick=\"{{ goWelcome }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#4A4842;\">Welcome<\u002Fbutton>\n        <button onclick=\"{{ goProcess }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#4A4842;\">How this was built<\u002Fbutton>\n        <button onclick=\"{{ goMethod }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#4A4842;\">Methodology<\u002Fbutton>\n        <sc-if value=\"{{ showThreads }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ goThreads }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#4A4842;\">Threads<\u002Fbutton><\u002Fsc-if>\n        <button onclick=\"{{ goHome }}\" style=\"background:none;border:none;cursor:pointer;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#4A4842;\">All areas<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900},&quot;showFraming&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Editorial&quot;,&quot;label&quot;:&quot;Show \\&quot;stated logic ↔ critics\\&quot; framing&quot;},&quot;showStatus&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Editorial&quot;,&quot;label&quot;:&quot;Show legal-status labels&quot;},&quot;showThreads&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Editorial&quot;,&quot;label&quot;:&quot;Show the reading-threads lens&quot;}}\">\nclass Component extends DCLogic {\n  ST = {\n    announced:{l:'Announced', c:'#8A867C'},\n    enacted:{l:'Enacted', c:'#20201D'},\n    partial:{l:'Partial', c:'#A9741F'},\n    blocked:{l:'Blocked', c:'#9C5A42'},\n    reversed:{l:'Reversed', c:'#6E5F73'},\n    contested:{l:'Contested', c:'#5C6670'}\n  };\n\n  STATUS_LEGEND = [\n    {label:'Announced', color:'#8A867C'},\n    {label:'Enacted', color:'#20201D'},\n    {label:'Partial', color:'#A9741F'},\n    {label:'Blocked', color:'#9C5A42'},\n    {label:'Reversed', color:'#6E5F73'}\n  ];\n\n  SPINES = {\"economy/taxcode\":[\"The federal tax code is not a single coherent design; it is an accumulation of decisions made over a century of political conflict, each new layer added on top of the old. The Tax Cuts and Jobs Act of 2017 was the most significant rewrite since 1986, reducing the top individual rate from 39.6 to 37 percent, dropping the corporate rate from 35 to 21 percent, and introducing pass-through deduction provisions, while setting most of the individual provisions to expire after 2025 to keep the ten-year revenue score within reconciliation limits. The policy question that the OBBBA's 2025 permanence decisions resolved was whether those expiring provisions would be extended: the answer, for most of them, was yes.\",\"The history of tax legislation is also the history of tax expenditures, deductions, credits, and exclusions that reduce the tax due on particular activities, effectively directing money toward purposes Congress wants to encourage (homeownership, employer-provided health insurance, retirement savings) without going through the appropriations process. The tipped-income deduction, the overtime exclusion, and the child tax credit expansion are in this tradition; the IRA clean-energy credits whose termination the OBBBA accelerated were also in this tradition, operating as tax subsidies for renewable-energy investment rather than direct spending.\"],\"economy/spending\":[\"The American national debt has a more continuous history than any politician who campaigns against it tends to admit. The debt has been larger, relative to the economy, than it is today, briefly, at the end of World War II, it exceeded 100 percent of GDP. What has changed is the trajectory: postwar surpluses and growth reduced the debt ratio through the 1970s; the Reagan tax cuts and the defense buildup pushed it back up; the Clinton-era surpluses brought it down again; the Bush tax cuts, the wars, and the financial crisis expanded it sharply; and it has grown as a share of the economy in every year since. The structural reality is that the gap between what the government spends on its mandatory programs and what it collects in taxes has been negative for most of the past four decades.\",\"The debt limit, established during World War I as a management convenience so the Treasury would not need congressional approval for each new bond issuance, became over time a periodic political flashpoint. Because it must be raised or suspended for the government to continue borrowing to pay obligations Congress has already incurred, it gives the minority party in Congress a moment of potential leverage that has been increasingly used, culminating in the 2011 standoff and its aftermath. The question of whether this leverage can or should be used as a genuine policy tool, or whether breaching the limit would constitute a constitutional violation of Congress's obligation to honor debts already authorized, has not been definitively resolved.\"],\"economy/tariffpol\":[\"There is a recurring American argument that importing manufactured goods from low-wage countries destroys domestic industry and impoverishes workers, and a counter-argument that the resulting lower prices benefit consumers, especially lower-income households who spend a larger share of their income on goods. Irwin's history documents how this argument has played out differently in different eras: the same economic logic of comparative advantage that looks like free-trade ideology to a domestic manufacturer looks like good policy to a household buying cheaper clothing and appliances.\",\"The IEEPA tariff program of 2025 raised this long-standing argument to a new level of ambition by applying a single set of \\\"reciprocal\\\" tariff rates across virtually all trading partners simultaneously, a use of emergency economic powers that courts found to exceed the statute's scope. The subsequent pivot to Section 122 of the Trade Act of 1974 and to Section 232 national-security tariffs reflected the administration's search for statutory authority sufficient to sustain the policy after the Supreme Court's ruling. The resulting legal landscape, which tariff authorities survive, at what rates, and subject to what restrictions, is still being worked out as of mid-2026.\"],\"economy/industrial\":[\"Industrial policy, the deliberate use of government resources to build or protect specific industries, has a longer American history than its reputation as a foreign idea would suggest. The tariff itself was, for most of American history, a tool of industrial policy: manufacturers lobbied for protection, and Congress provided it. The more direct forms of industrial policy, federal equity stakes, production subsidies, directed procurement, came in waves: the wartime industrial mobilizations of both world wars, the defense-industry relationships of the Cold War, the semiconductor and aerospace support that underwrote American technological leadership. The tendency to describe these as merely \\\"defense\\\" rather than \\\"industrial\\\" policy has made them easier to sustain politically but has not changed their economic character.\",\"The CHIPS and Science Act of 2025, enacted to counter China's semiconductor ambitions and reduce U.S. dependence on Taiwanese chip production, represented the most explicit peacetime industrial policy in decades, establishing a $52 billion fund for domestic semiconductor manufacturing, research, and workforce development. The repurposing of CHIPS mechanisms for equity stakes in semiconductor firms followed the same logic at a more specific level: federal investment in particular companies rather than in the industry generally. Whether this represents a durable shift in American industrial-policy philosophy or a temporary expedient will be determined by whether the investments produce the intended domestic manufacturing capacity.\"],\"economy/unions\":[\"The National Labor Relations Act of 1935, the Wagner Act, was the legislative foundation of modern American labor relations. It guaranteed workers the right to organize, to bargain collectively, and to strike; it created the National Labor Relations Board to administer representation elections and adjudicate unfair labor practices; and it placed the federal government firmly on the side of collective bargaining for the first time. The political coalition that produced it was New Deal-era and depended on the argument that organized labor would stabilize consumer demand and reduce the economic instability that had produced the Depression.\",\"The Taft-Hartley Act of 1947, passed by a Republican Congress over President Truman's veto, substantially modified the Wagner Act framework. It prohibited secondary boycotts, allowed states to pass right-to-work laws banning union-security agreements, permitted the president to seek injunctions in national-emergency strikes, and required union officials to swear they were not Communists. In the decades since, the basic framework has remained intact while enforcement, board composition, and NLRB doctrine have shifted significantly with each administration, the board's general counsel and its five members setting a policy direction that can be substantially reversed when the appointing party changes. The NLRB's structure makes it unusually sensitive to quorum failures, as the current episode demonstrates.\"],\"economy/standards\":[\"The Fair Labor Standards Act of 1938 established the basic floor of individual worker protections in the American economy: a minimum wage, overtime pay for hours above forty per week, and restrictions on child labor. It was, at the time, deeply contested, fought by employers as an intrusion on freedom of contract and by some labor unions who worried it would undercut higher wages they had negotiated. The minimum wage has been raised periodically since 1938, though not at a pace that has kept it constant in real terms; it has been at $7.25 since 2009, making it one of the longest periods without an increase in the Act's history.\",\"The independent-contractor classification question, whether a given worker is an employee entitled to minimum wage, overtime, and other protections, or an independent contractor who is not, has been among the most litigated areas of labor law for decades. The legal tests for classification vary by statute and jurisdiction, but two frameworks have competed for dominance: the \\\"economic realities\\\" test, which looks at whether the worker is economically dependent on the employer, and the stricter \\\"ABC test,\\\" which presumes employment unless the hiring firm can demonstrate the worker operates an independent business. The Trump administration's 2025 contractor rule moved back toward the economic-realities test, reversing a Biden-era rule that had moved toward the ABC framework.\"],\"economy/fedwork\":[\"This T3 node surfaces the same events, the mass reductions-in-force, the deferred-resignation program, Schedule F reclassification, under the **labor-market framing** rather than the civil-service-restructuring framing that governs the Government & power node. Roughly 317,000 federal departures across 2025 constitutes one of the largest single-employer workforce reductions in modern American history, with effects on local economies, federal service delivery, and government institutional capacity that are properly analyzed in terms of labor markets, not just executive authority. The interpretive spine, however, what the civil service is, how it came to be, and what the legal framework governing it means, is built entirely in `GOVERNMENT-SPINE.md` and is not re-derived here.\"],\"economy/banking\":[\"The architecture of modern American bank regulation was built in two great waves, the Depression era and the post-2008 era, each responding to a financial crisis severe enough to produce legislative action that might otherwise have been politically impossible. The Glass-Steagall Act of 1933 separated commercial banking from investment banking, created deposit insurance (the FDIC), and established the framework of federal banking supervision that governed the industry for sixty years. The Gramm-Leach-Bliley Act of 1999 repealed the Glass-Steagall separation, allowing commercial banks to reenter investment banking and vice versa, a change that many analysts consider a contributing factor to the 2008 financial crisis, though the causal story is more complicated than any single statute.\",\"The Dodd-Frank Wall Street Reform and Consumer Protection Act of 2010, 848 pages of statute, plus thousands of pages of implementing regulation, was the most comprehensive financial regulation since the 1930s. Among its provisions was the creation of the Consumer Financial Protection Bureau, a novel regulatory design: an independent agency housed inside the Federal Reserve System, funded by the Fed's earnings rather than congressional appropriations, with authority consolidated from seven separate regulators covering mortgages, credit cards, student loans, and other consumer financial products. The funding structure, not dependent on congressional appropriations, was a deliberate design choice to insulate the CFPB from the lobbying pressure that had weakened consumer protection in earlier regulatory frameworks.\"],\"economy/crypto\":[\"There is no deep historical spine for federal cryptocurrency regulation because federal cryptocurrency regulation, in any comprehensive form, did not exist before the GENIUS Act of July 2025. Blockchain technology emerged in 2008; Bitcoin was issued in 2009; the subsequent decade of cryptocurrency development proceeded under a patchwork of enforcement actions by the SEC and CFTC, guidance from FinCEN, and the absence of a clear legislative framework. The GENIUS Act, establishing the first federal regulatory framework for stablecoins, specifying reserve requirements, and setting disclosure obligations for stablecoin issuers, is, in a meaningful sense, the founding statute for this area of federal law rather than a modification of an existing one.\",\"Reading this node through historical perspective means acknowledging that it lacks the historical depth the other nodes carry. What context exists comes from the history of financial innovation and its regulation more generally: new financial instruments have repeatedly outpaced regulatory frameworks, and the regulatory response has typically followed significant losses or frauds. The failure of crypto exchange FTX in 2022, with substantial losses to retail investors, provided the political impetus for the legislative action that followed.\"],\"economy/antitrust\":[\"American antitrust law began with a simple observation: markets with only one seller are not really markets at all. The Sherman Antitrust Act of 1890 declared monopolization and conspiracy in restraint of trade to be federal crimes, a sweeping declaration that the subsequent decades of interpretation have had to fill in. The Clayton Act of 1914 and the Federal Trade Commission Act of the same year added more specific prohibitions (price discrimination, exclusive dealing, anticompetitive mergers) and created the FTC as a specialized antitrust enforcement agency alongside the DOJ's Antitrust Division.\",\"For most of the twentieth century, antitrust enforcement was expansive in principle but variable in application. The transformation came with the Chicago School revolution of the 1970s and 1980s: a generation of economists and legal scholars, centered at the University of Chicago, argued that antitrust law had been misapplied, used to protect competitors rather than competition, prohibiting mergers and practices that actually produced efficiencies and lower consumer prices. Under this framework, consumer welfare (measured largely by price) became the touchstone of antitrust analysis, and enforcement became substantially more permissive. The post-Chicago synthesis that developed in the 1990s and 2000s accepted the consumer-welfare focus while pushing back on the Chicago School's confidence that markets self-correct rapidly enough to make antitrust intervention rarely necessary. The \\\"neo-Brandeisian\\\" movement of the 2010s contested the consumer-welfare standard more directly, arguing that antitrust should address concentration of economic and political power, not only prices. This debate is ongoing.\"],\"economy/fossil\":[\"The American energy economy of the twenty-first century is shaped by a development that almost no forecaster predicted: the shale revolution. Hydraulic fracturing and horizontal drilling, refined in the 2000s, made previously unrecoverable oil and gas reserves economically accessible and transformed the United States from a net energy importer to a major exporter of both oil and liquefied natural gas within roughly a decade. Daniel Yergin's account of global energy systems identifies the implications: the United States, long vulnerable to oil-price shocks driven by OPEC decisions, became a swing producer capable of influencing global markets, a major exporter of LNG to European allies seeking alternatives to Russian gas, and a country with economic and geopolitical interests in keeping fossil-fuel production high.\",\"\\\"Energy dominance\\\", the idea that the United States should maximize domestic production to achieve energy security, lower costs, and geopolitical leverage, is the policy expression of this transformed position. The logic is straightforward: if the United States produces more, it is less dependent on potentially hostile suppliers, has more to offer allies, and can keep domestic energy prices lower. The counterargument, developed in the climate-policy debate, is that maximizing fossil-fuel production accelerates the warming whose costs will eventually be borne by the same economy the dominance policy is meant to strengthen.\"],\"economy/climate\":[\"Federal climate policy arrived late by international standards and has been less durable than in most peer democracies, reflecting both the constitutional structure (Senate ratification requirements for treaties, state roles in implementation) and the political economy of fossil-fuel production in the United States. The Kyoto Protocol of 1997 was not ratified by the Senate; the Paris Agreement of 2015 was concluded as an executive agreement rather than a treaty, enabling President Trump to withdraw from it in his first term (rejoined by Biden in 2021, withdrawn again in 2025).\",\"The Inflation Reduction Act of 2022 represented the most significant federal climate legislation in American history, not by imposing regulations or setting carbon prices, but by creating an enormous system of tax credits to incentivize clean-energy investment. Investment tax credits for solar and wind, production tax credits for clean electricity, credits for electric vehicles, hydrogen, and advanced manufacturing, the IRA's clean-energy provisions were projected to reduce US greenhouse gas emissions by roughly 40 percent below 2005 levels by 2030, at a cost to the Treasury of approximately $370 billion over ten years. The OBBBA's termination of most of these credits reversed the legislative framework without (directly) banning the underlying activities; the question of whether private investment, already committed in reliance on the credits, would continue regardless became a major economic and legal question after the OBBBA's enactment.\"],\"economy/envreg\":[\"The environmental legislation of 1969–1972 represents one of the most concentrated bursts of regulatory activity in American history. The National Environmental Policy Act (1969), the Clean Air Act (1970), the Clean Water Act (1972), and the creation of the Environmental Protection Agency (1970) were all enacted within a four-year period, driven by a combination of environmental disasters (the Cuyahoga River fire, Santa Barbara oil spill), growing scientific understanding of pollution's health effects, and a bipartisan political coalition that no longer exists in the same form. Richard Lazarus's history of this period emphasizes that environmental law was not a natural extension of prior regulatory frameworks but a genuine innovation, new kinds of standards, new mechanisms for citizen enforcement, and a new set of federal-state relationships.\",\"The National Environmental Policy Act's most consequential provision was not a substantive standard but a procedural requirement: any major federal action significantly affecting the environment must be preceded by an environmental impact statement, a document that forces the agency to analyze alternatives and consider environmental costs before proceeding. The EIS requirement has been used repeatedly as a tool to slow or block projects, pipelines, highways, mines, that opponents could not stop on substantive grounds. Critics argue it has become a litigation mechanism that adds years to permitting timelines for projects, including clean-energy projects, without producing proportionate environmental benefits; defenders argue it ensures genuine consideration of environmental consequences before commitments are made. Both things can be true simultaneously, which is why NEPA reform has been on the legislati
