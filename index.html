p toward unilateral action on Mexican soil.',\n                    anchor:'Sexton / Grandin'},\n                  {t:'Venezuela strike campaign; regime-change pressure on Maduro', status:'partial', mech:'Military operation', agency:'DoD / SOUTHCOM',\n                    summary:'A strike campaign and regime-change pressure targeted the Maduro government, paired with the Tren de Aragua terrorist designation.',\n                    impact:'Framed as confronting a narco-authoritarian regime; critics question the legal authority and escalation risk.',\n                    links:[{node:'Enforcement & removal', how:'the Tren de Aragua designation feeds interior removals'},{node:'Economic statecraft', how:'oil-tanker seizure applies parallel economic pressure'}]},\n                  {t:'Oil-tanker seizure as economic leverage', status:'enacted', mech:'Enforcement action', agency:'Treasury / DoD',\n                    summary:'Seizure of Venezuelan oil shipments applied economic pressure alongside the military campaign.'}\n                ],\n                crosslinks:['The Venezuela campaign','Enforcement & removal','Civil-military relations & domestic use'],\n                refs:[{tag:'ANCHOR',text:'Sexton, The Monroe Doctrine (2011)'},{tag:'BASELINE',text:'Schoultz, Beneath the United States (Harvard, 1998)'},{tag:'C',text:'Grandin, Empire\\u2019s Workshop (2006)'}]\n              },\n              {\n                id:'civmil', name:'Civil-military relations & domestic use',\n                spine:[\n                  'The Posse Comitatus Act of 1878, a Reconstruction-era response that has outlasted its crisis by 150 years, is a narrow prohibition with large exceptions. The line between \"support to civil authorities\" (permitted) and \"direct law enforcement\" (prohibited) is the legal question at the center of every domestic-deployment controversy.',\n                  'Huntington\\u2019s \"objective civilian control\" and Feaver\\u2019s principal-agent revision are the live frames for the general-officer firings; Cohen\\u2019s Supreme Command reads assertive civilian direction as legitimate, while Rosa Brooks warns of a slow drift in which the military becomes the default answer to every problem. Four named traditions; the firings and deployments read differently in each.'\n                ],\n                changes:[\n                  {t:'~20% general-officer cuts; fired JAGs; \"Department of War\" renaming', status:'partial', mech:'Personnel action', agency:'DoD',\n                    summary:'Roughly a fifth of general-officer billets were cut, judge advocates removed, and the department rebranded \"Department of War.\"',\n                    impact:'Supporters call it flattening a bloated hierarchy; critics see erosion of apolitical military norms.',\n                    anchor:'Huntington / Feaver'},\n                  {t:'National Guard civil-unrest units; domestic deployments', status:'blocked', mech:'Presidential action', agency:'DoD / DHS',\n                    summary:'National Guard units were deployed into several cities for civil-unrest and crime missions, testing the line between support to civil authorities and direct law enforcement.',\n                    impact:'Defenders cite public-safety emergencies; courts and critics invoke Posse Comitatus limits on domestic use of force.',\n                    history:[{date:'2025', label:'Announced / deployed'},{date:'2025', label:'Blocked (Posse Comitatus ruling, Los Angeles)'}],\n                    legal:[{docket:'Los Angeles deployment challenge', court:'federal district court', status:'found PCA violation', url:'https://www.courtlistener.com/'}],\n                    links:[{node:'Power over the states (Govt & power)', how:'Guard federalization over governor objection'}]}\n                ],\n                crosslinks:['Power over the states (Govt & power)','Policing & law enforcement (Rights & justice)'],\n                refs:[{tag:'FRAME',text:'Huntington, The Soldier and the State (1957)'},{tag:'FRAME',text:'Feaver, Armed Servants (2003)'},{tag:'FRAME',text:'Brooks, How Everything Became War (2016)'}]\n              }\n            ]\n          },\n          {\n            id:'diplomacy', code:'T2-3', name:'Diplomacy, alliances & grand strategy', bridge:false,\n            scope:'Statecraft, the alliance system, and the doctrine behind it, the largest node in the umbrella.',\n            tier3:[\n              {\n                id:'doctrine', name:'Doctrine & the international order',\n                spine:[\n                  'The grand-strategy debate is not uniquely contemporary, it has run continuously since 1947. Mead\\u2019s four schools (Hamiltonian, Jeffersonian, Wilsonian, Jacksonian) is the most influential cultural map; Posen and Ikenberry supply the strategic and institutional frames. The postwar consensus was primacy; the current posture slides toward selective engagement and offshore balancing without fully arriving at either.',\n                  'Whether Trump-2 is coherently Jacksonian or a hybrid is itself contested, the corpus carries the debate and presents Mead\\u2019s framework as a thesis, not the site\\u2019s verdict.'\n                ],\n                changes:[\n                  {t:'NSS 2025: primacy → transactional, spheres-of-influence flavor', status:'announced', mech:'Strategy document', agency:'White House / NSC',\n                    summary:'The 2025 National Security Strategy moved from primacy toward a transactional, spheres-of-influence posture.',\n                    impact:'Whether this is coherently Jacksonian or a hybrid is itself contested; the record carries Mead\\u2019s framework as a thesis, not a verdict.',\n                    anchor:'Mead / Ikenberry'},\n                  {t:'NATO expansion halted', status:'enacted', mech:'Alliance policy', agency:'State / NSC',\n                    summary:'NATO enlargement was halted and alliance guarantees framed in more conditional terms.'}\n                ],\n                crosslinks:['Strategy & global force posture','Multilateral institutions & treaty withdrawals'],\n                refs:[{tag:'FRAME',text:'Mead, Special Providence (2001); \"The Jacksonian Revolt\" (2017)'},{tag:'FRAME',text:'Ikenberry, Liberal Leviathan (2011)'},{tag:'C',text:'Mearsheimer, Tragedy of Great Power Politics (named)'}]\n              },\n              {\n                id:'russia', name:'Russia, Ukraine & European security',\n                spine:[\n                  'Plokhy\\u2019s history of Ukraine is the place to begin, a country at the crossroads of Eastern Europe whose eastern and western regions have had fundamentally different relationships to the question of sovereignty. Sarotte\\u2019s Not One Inch settles the \"broken promise\" controversy with rigor: informal assurances were made in 1990 but never written into the treaties signed. Hill & Gaddy and Stent establish the baseline for reading any US–Russia negotiation.'\n                ],\n                changes:[\n                  {t:'Pivot from \"constraining\" Russia to \"strategic stability\"', status:'announced', mech:'Policy shift', agency:'State / NSC',\n                    summary:'US–Russia policy shifted from constraining Moscow toward a \"strategic stability\" framing.',\n                    anchor:'Sarotte / Hill & Gaddy'},\n                  {t:'Push toward a Ukraine settlement on current lines', status:'partial', mech:'Diplomatic initiative', agency:'State',\n                    summary:'The administration pressed Ukraine toward a negotiated settlement on roughly current lines.',\n                    impact:'Cast by supporters as ending a costly stalemate; by critics as rewarding aggression and unsettling allies.',\n                    links:[{node:'Export controls & critical minerals', how:'the Ukraine minerals deal ran alongside settlement talks'}]}\n                ],\n                crosslinks:['The Ukraine settlement','Export controls & critical minerals'],\n                refs:[{tag:'BASELINE',text:'Plokhy, The Gates of Europe (2015)'},{tag:'ANCHOR',text:'Sarotte, Not One Inch (Yale, 2021)'},{tag:'FRAME',text:'Hill & Gaddy, Mr. Putin (Brookings, 2015)'}]\n              },\n              {\n                id:'mideast', name:'Middle East',\n                spine:[\n                  'The U.S. interest in the region began as almost entirely about oil (Yergin\\u2019s The Prize is the baseline) and later added the categorically different Israel-Palestine dimension (Gelvin holds both national narratives) and the Iran strand (Takeyh reads the Islamic Republic as both ideological and interest-driven). Conflating oil and Israel-Palestine has produced more confused analysis than almost any other mistake in Middle East commentary.'\n                ],\n                changes:[\n                  {t:'Iran strikes', date:'February 2026', status:'enacted', mech:'Military operation', agency:'DoD',\n                    summary:'US strikes hit Iranian targets amid the wider regional confrontation.',\n                    anchor:'Takeyh / Gelvin'},\n                  {t:'Gaza ceasefire / hostage deal', date:'2025-10-13', status:'enacted', mech:'Diplomatic agreement', agency:'State',\n                    summary:'A ceasefire and hostage-release deal paused the Gaza war.'},\n                  {t:'Attempted Abraham Accords expansion to Saudi Arabia', status:'announced', mech:'Diplomatic initiative', agency:'State',\n                    summary:'The administration sought to extend the Abraham Accords to Saudi Arabia.'}\n                ],\n                crosslinks:['Doctrine & the international order'],\n                refs:[{tag:'BASELINE',text:'Yergin, The Prize (1991)'},{tag:'FRAME',text:'Gelvin, The Israel-Palestine Conflict (2014)'},{tag:'FRAME',text:'Takeyh, Guardians of the Revolution (2009)'}]\n              },\n              {\n                id:'territorial', name:'Western Hemisphere & territorial',\n                spine:[\n                  'The United States has purchased territory before, Louisiana (1803), Alaska (1867), and Truman offered Denmark $100M for Greenland in 1946. What is genuinely novel is pairing a territorial-acquisition proposal with a tariff threat against a NATO ally in the same breath. That combination has no direct precedent and sits uneasily in every one of Mead\\u2019s four schools.'\n                ],\n                changes:[\n                  {t:'Greenland acquisition pressure; tariff threat against Denmark', status:'announced', mech:'Presidential statement', agency:'White House', noAnchor:true,\n                    summary:'Acquisition pressure on Greenland was paired with a tariff threat against Denmark, a NATO ally, a combination with no direct precedent in American foreign policy.',\n                    impact:'Supporters cite Arctic security and the precedent of territorial purchase (Louisiana, Alaska); critics see coercion of an ally.',\n                    links:[{node:'Economic statecraft', how:'the tariff threat is the coercive lever'}]},\n                  {t:'Panama Canal and Canada pressure; force \"not ruled out\"', status:'announced', mech:'Presidential statement', agency:'White House', noAnchor:true,\n                    summary:'Pressure over the Panama Canal and Canada, with military force \"not ruled out.\"'}\n                ],\n                crosslinks:['The Greenland gambit','Tariffs & trade coercion'],\n                refs:[{tag:'BASELINE',text:'Sexton (cross-ref, Homeland node)'},{tag:'BASELINE',text:'CRS Greenland report [flagged]'}]\n              }\n            ]\n          },\n          {\n            id:'econstate', code:'T2-4', name:'Economic statecraft', bridge:true,\n            scope:'Economic tools used as foreign-policy leverage, tariffs-as-coercion, sanctions, export controls. A bridge node with Economy & work.',\n            tier3:[\n              {\n                id:'tariffs', name:'Tariffs & trade coercion',\n                spine:[\n                  'It took a refugee political economist (Albert Hirschman, writing in 1945) to show why trade and foreign policy are inseparable: trade relationships generate asymmetric dependence, and states have always used that leverage. Douglas Irwin\\u2019s three eras (Revenue → Restriction → Reciprocity) organize two and a half centuries of American trade policy; Farrell and Newman\\u2019s \"weaponized interdependence\" describes the modern chokepoints.',\n                  'IEEPA (1977) had been used mainly for targeted sanctions, not broad tariffs. The 2025 \"reciprocal tariff\" declaration crossed from Reciprocity-era multilateralism back toward the Restriction era, with a Hirschman coercion logic on top. The Supreme Court\\u2019s 2026 ruling striking the broad application is the Phase-2 legal development.'\n                ],\n                changes:[\n                  {t:'IEEPA \"reciprocal\" tariffs announced', date:'2025-04-02', status:'blocked', mech:'Executive order (IEEPA)', agency:'White House / USTR',\n                    summary:'A \"reciprocal tariff\" declaration invoked emergency economic powers to impose broad tariffs, a use of IEEPA far beyond its prior targeted-sanctions role.',\n                    impact:'Proponents frame it as leverage to rebalance trade; critics as a tax imposed without Congress under a statute never meant for it.',\n                    history:[{date:'2025-04-02', label:'Announced (executive order)'},{date:'2026-02-20', label:'Blocked (Supreme Court, 6–3)'},{date:'2026-02-24', label:'Partial (re-imposed via §122)'}],\n                    legal:[{docket:'Learning Resources v. Trump', court:'U.S. Supreme Court', status:'struck 6–3', url:'https://www.supremecourt.gov/'}],\n                    sources:[{label:'Executive order (Federal Register)', url:'https://www.federalregister.gov/presidential-documents/executive-orders'}],\n                    anchor:'Irwin / Hirschman',\n                    links:[{node:'Tariffs & trade policy (Economy & work)', how:'the same instrument, read through the domestic-price lens'}]},\n                  {t:'Learning Resources v. Trump strikes IEEPA tariffs 6–3', date:'2026-02-20', status:'blocked', mech:'Court ruling', agency:'U.S. Supreme Court',\n                    summary:'The Court struck the IEEPA tariffs 6–3, holding the statute did not authorize across-the-board tariffs.',\n                    sources:[{label:'Slip opinion (supremecourt.gov)', url:'https://www.supremecourt.gov/'}]},\n                  {t:'Re-imposed as 10% tariff via Section 122', date:'2026-02-24', status:'partial', mech:'Statutory authority (§122)', agency:'USTR',\n                    summary:'Within days a 10% tariff was re-imposed under Section 122 of the Trade Act, a narrower but firmer legal footing.'}\n                ],\n                crosslinks:['Tariffs & trade policy (Economy & work)','The Greenland gambit'],\n                refs:[{tag:'ANCHOR',text:'Irwin, Clashing over Commerce (Chicago, 2017)'},{tag:'FRAME',text:'Hirschman, National Power… (1945)'},{tag:'FRAME',text:'Farrell & Newman, Underground Empire (2023)'}]\n              },\n              {\n                id:'exportctl', name:'Export controls & critical minerals',\n                spine:[\n                  'Chris Miller\\u2019s Chip War is the durable baseline: the semiconductor supply chain runs through a few American-controlled chokepoints (TSMC, ASML, Cadence/Synopsys), giving the U.S. effective veto power over who gets the most advanced chips. The critical-minerals dimension is the obverse, China controls the mining and processing of rare earths, and the 2025–26 tit-for-tat is each side deploying the chokepoints it controls.'\n                ],\n                changes:[\n                  {t:'Advanced-chip export controls maintained and extended', status:'enacted', mech:'Export controls', agency:'Commerce / BIS',\n                    summary:'Advanced-chip export controls were held and extended, keeping the semiconductor chokepoints that give the US effective veto power over the most advanced chips.',\n                    sources:[{label:'Bureau of Industry and Security', url:'https://www.bis.doc.gov/'}],\n                    anchor:'Miller, Chip War'},\n                  {t:'Rare-earth countermeasures; DPA minerals; Ukraine minerals deal', status:'partial', mech:'Countermeasures / DPA', agency:'Commerce / DoD',\n                    summary:'Rare-earth countermeasures, Defense Production Act minerals actions, and a Ukraine minerals deal answered Chinese dominance in mining and processing.'}\n                ],\n                crosslinks:['Indo-Pacific & China deterrence','Manufacturing & industrial policy (Economy & work)'],\n                refs:[{tag:'ANCHOR',text:'Miller, Chip War (Scribner, 2022)'},{tag:'FRAME',text:'Farrell & Newman (chokepoints)'}]\n              }\n            ]\n          },\n          {\n            id:'aid', code:'T2-5', name:'Foreign aid & global institutions', bridge:false,\n            scope:'Development and humanitarian assistance and U.S. participation in the multilateral order.',\n            tier3:[\n              {\n                id:'assistance', name:'Foreign assistance & development aid',\n                spine:[\n                  'USAID was created by Kennedy in 1961 on a theory: that poverty and instability abroad were security threats, and that development required sustained civilian expertise. For sixty years it operated as a distinctive American institution. PEPFAR, launched by George W. Bush in 2003, is the clearest illustration of American aid at its best, an estimated 25 million lives saved. Carol Lancaster\\u2019s account explains the coalition politics behind every aid program.',\n                  'The 2025 USAID shutdown and PEPFAR award terminations represent the most significant disruption to this apparatus since its founding.'\n                ],\n                changes:[\n                  {t:'USAID dismantled and folded into State', date:'~2025-07-01', status:'enacted', mech:'Reorganization', agency:'State / USAID',\n                    summary:'USAID was dismantled and folded into the State Department, ending sixty years as an independent development agency.',\n                    impact:'Framed as cutting waste and aligning aid with strategy; critics warn of lost expertise and humanitarian capacity.',\n                    anchor:'Lancaster, Foreign Aid',\n                    links:[{node:'DOGE & agency dismantlement (Govt & power)', how:'executed through the DOGE process'}]},\n                  {t:'~$12.7B in global-health awards terminated; PEPFAR disruption', status:'enacted', mech:'Grant terminations', agency:'State',\n                    summary:'Roughly $12.7B in global-health awards were terminated, disrupting PEPFAR, the program credited with saving an estimated 25 million lives.',\n                    impact:'Supporters cite fiscal discipline and reform; critics project preventable deaths from interrupted treatment.'}\n                ],\n                crosslinks:['Soft-power retrenchment','DOGE & agency dismantlement (Govt & power)'],\n                refs:[{tag:'BASELINE',text:'Lancaster, Foreign Aid (Chicago, 2007)'},{tag:'BASELINE',text:'CRS foreign-assistance overview [flagged]'}]\n              },\n              {\n                id:'broadcast', name:'International broadcasting & public diplomacy',\n                spine:[\n                  'Joseph Nye coined \"soft power\", getting what you want through attraction rather than coercion. International broadcasting is its most direct institutional expression. Nicholas Cull\\u2019s history of the USIA shows that editorial independence was not incidental to the broadcasters\\u2019 effectiveness but central to it: audiences trusted VOA and RFE precisely because they reported news Washington found inconvenient.',\n                  'The 2025 USAGM cuts represent, in Nye\\u2019s framework, a decision to abandon one of the most effective soft-power instruments the U.S. ever built.'\n                ],\n                changes:[\n                  {t:'VOA / USAGM funding cut ~85%; RFE/RL disruption', status:'partial', mech:'Funding action', agency:'USAGM',\n                    summary:'Voice of America and USAGM funding was cut roughly 85%, with RFE/RL operations disrupted.',\n                    impact:'In Nye\\u2019s soft-power terms, read by supporters as trimming redundant broadcasting; by critics as abandoning one of the most effective instruments the US built.',\n                    anchor:'Nye / Cull'}\n                ],\n                crosslinks:['Soft-power retrenchment'],\n                refs:[{tag:'FRAME',text:'Nye, Soft Power (2004)'},{tag:'ANCHOR',text:'Cull, The Cold War and the USIA (Cambridge, 2008)'}]\n              },\n              {\n                id:'multilat', name:'Multilateral institutions & treaty withdrawals',\n                spine:[\n                  'The order the U.S. built after 1945 was not altruism, Ikenberry calls it \"strategic restraint\": accepting constraints in exchange for legitimacy and durability. The WHO was built to be a technical body, not a political one; its International Health Regulations were the machinery for a lesson learned from the 1918 pandemic. NATO is the most complex case, because its value depends on the credibility of a commitment that is not easily restored once doubted.'\n                ],\n                changes:[\n                  {t:'Day-one withdrawals from WHO and Paris/UNFCCC', status:'enacted', mech:'Executive order (withdrawal)', agency:'State',\n                    summary:'Day-one withdrawals from the WHO and the Paris Agreement began a broad exit from multilateral commitments.',\n                    impact:'Supporters cite sovereignty and cost; critics cite the \"strategic restraint\" that made the postwar order durable.',\n                    sources:[{label:'Executive orders (Federal Register)', url:'https://www.federalregister.gov/presidential-documents/executive-orders'}],\n                    anchor:'Ikenberry',\n                    links:[{node:'Climate & clean-energy rollback (Economy & work)', how:'the Paris exit pairs with domestic IRA repeal'}]},\n                  {t:'By Jan 2026, exit from 66 international organizations incl. IPCC', status:'enacted', mech:'Withdrawals', agency:'State',\n                    summary:'By January 2026 the US had exited 66 international organizations, including the IPCC.'}\n                ],\n                crosslinks:['Doctrine & the international order','Climate & clean-energy rollback (Economy & work)'],\n                refs:[{tag:'FRAME',text:'Ikenberry, A World Safe for Democracy (Yale, 2020)'},{tag:'BASELINE',text:'Weiss & Daws, Oxford Handbook on the UN (2018)'}]\n              }\n            ]\n          }\n        ]\n      },\n      {\n        id:'economy', num:'01', name:'Economy & work', status:'structure',\n        statusNote:'Structure locked (13 Tier-3 nodes). Historical spines complete; change-interpretation pending.',\n        gist:'Tariffs return as the signature tool, a permanent tax cut (the OBBBA), an energy-production push, and a lighter-touch financial-regulation posture, set against an affordability squeeze.',\n        logic:'Framed as restoring American manufacturing, lowering long-run costs, and cutting regulatory burden; critics warn of higher consumer prices and wider deficits.',\n        clusters:[\n          {title:'Tariffs & trade', blurb:'IEEPA \"reciprocal\" tariffs struck down (Feb 2026), re-imposed via Section 122; the trade-weighted average rate rose from ~2.6% to ~13.4%.', status:'blocked'},\n          {title:'Taxes & fiscal (OBBBA)', blurb:'TCJA cuts made permanent; new tips/overtime/senior deductions; IRA clean-energy credits ended.', status:'enacted'},\n          {title:'The federal workforce', blurb:'~317,000 federal departures across 2025 via RIFs, deferred resignation, and attrition.', status:'partial'},\n          {title:'Energy dominance', blurb:'The Unleashing American Energy EO, a National Energy Dominance Council, and mandated lease sales.', status:'enacted'},\n          {title:'Financial regulation & crypto', blurb:'The CFPB neutralized; the GENIUS Act created the first federal stablecoin framework.', status:'partial'}\n        ],\n        threads:[{name:'The OBBBA megabill'},{name:'The affordability squeeze'},{name:'The tariff-and-reshore push'},{name:'The deregulation wave'}],\n        tier2:[\n          {id:'taxspend', code:'T2-1', name:'Taxes & federal spending', bridge:false, scope:'Revenue and outlays, the tax code, deficits, appropriations, the budget. OBBBA\\u2019s center of gravity.', tier3:[\n            {id:'taxcode', name:'Tax policy & the OBBBA code', changes:[{t:'TCJA individual cuts made permanent; tips/overtime/car-loan/senior deductions; CTC to $2,200', date:'2025-07-04', status:'enacted'},{t:'IRA clean-energy credits terminated', status:'enacted'}], crosslinks:['Climate & clean-energy rollback','The OBBBA megabill'], refs:[{tag:'REPORTING',text:'IRS; Tax Foundation'}]},\n            {id:'spending', name:'Federal spending, deficits & the budget', changes:[{t:'OBBBA debt-limit increase; rescissions; impoundment disputes', status:'partial'}], crosslinks:['Spending power & impoundment (Govt & power)'], refs:[{tag:'REPORTING',text:'Brookings; CBO'}]}\n          ]},\n          {id:'trade', code:'T2-2', name:'Trade & manufacturing', bridge:true, scope:'Tariffs, trade policy, reshoring, industrial policy. Bridge node with Borders; the heaviest change-mass in the umbrella.', tier3:[\n            {id:'tariffpol', name:'Tariffs & trade policy', changes:[{t:'IEEPA reciprocal tariffs → Learning Resources v. Trump → Section 122 pivot', date:'2025–2026', status:'blocked'},{t:'Section 232 sectoral tariffs (steel, autos, 25% on semiconductors)', status:'enacted'}], crosslinks:['Tariffs & trade coercion (Borders)','The tariff-and-reshore push'], refs:[{tag:'REPORTING',text:'CFR; Perkins Coie; Brookings'}]},\n            {id:'industrial', name:'Manufacturing & industrial policy', changes:[{t:'Reshoring conditioned on tariff exemptions; repurposed-CHIPS equity (~$9.9B Intel)', status:'enacted'},{t:'Semiconductor & critical-minerals onshoring; shipbuilding', status:'partial'}], crosslinks:['Export controls & critical minerals (Borders)'], refs:[{tag:'REPORTING',text:'White & Case; Hogan Lovells'}]}\n          ]},\n          {id:'labor', code:'T2-3', name:'Work & labor', bridge:true, scope:'Labor relations, worker standards, and the federal workforce itself, three distinct spines.', tier3:[\n            {id:'unions', name:'Labor relations & union law', changes:[{t:'NLRB lost quorum for ~a year after Wilcox/Abruzzo firings; SCOTUS allowed the removal', date:'2025-01-27 → 2026-01-07', status:'partial'}], crosslinks:['The unitary-executive cases (Govt & power)'], refs:[{tag:'REPORTING',text:'Bloomberg Law'}]},\n            {id:'standards', name:'Wages, classification & workplace standards', changes:[{t:'Business-friendly independent-contractor rule; H-1B prevailing-wage rule', status:'partial'}], crosslinks:['Immigration & border control (Borders)'], refs:[{tag:'REPORTING',text:'NELP'}]},\n            {id:'fedwork', name:'The federal workforce', changes:[{t:'DOGE RIFs, deferred-resignation program, ~317k departures; Schedule F reclassification', status:'partial'}], crosslinks:['DOGE & agency dismantlement (Govt & power)','The career civil service & Schedule F'], refs:[{tag:'REPORTING',text:'Government Executive; NPR'}]}\n          ]},\n          {id:'finance', code:'T2-4', name:'Markets, finance & competition', bridge:false, scope:'Financial regulation, digital assets, and antitrust.', tier3:[\n            {id:'banking', name:'Banking & consumer financial regulation', changes:[{t:'CFPB neutralized (operations halted Feb 2025); ~90% layoff blocked in court', status:'blocked'}], crosslinks:['The deregulation wave'], refs:[{tag:'REPORTING',text:'American Banker'}]},\n            {id:'crypto', name:'Digital assets & crypto', changes:[{t:'Digital-assets EO; GENIUS Act stablecoin framework', date:'July 2025', status:'enacted'}], crosslinks:['Crypto mainstreaming'], refs:[{tag:'REPORTING',text:'Freshfields'}]},\n            {id:'antitrust', name:'Antitrust & competition', changes:[{t:'FTC/DOJ continue Big Tech cases; faster merger review; \"tech-censorship\" inquiry', status:'partial'}], crosslinks:['Free speech & expression (Rights & justice)'], refs:[{tag:'REPORTING',text:'Hogan Lovells'}]}\n          ]},\n          {id:'energy', code:'T2-5', name:'Energy, environment & resources', bridge:true, scope:'Energy production, climate/clean-energy policy, environmental regulation and public lands. Environment folds in here.', tier3:[\n            {id:'fossil', name:'Fossil-fuel production & energy dominance', changes:[{t:'Unleashing American Energy EO; National Energy Dominance Council; mandated offshore/Alaska leasing', status:'enacted'}], crosslinks:['The affordability squeeze'], refs:[{tag:'REPORTING',text:'White House; DOI'}]},\n            {id:'climate', name:'Climate & clean-energy rollback', changes:[{t:'OBBBA termination of IRA credits; EV/clean-energy reversals', status:'enacted'}], crosslinks:['Multilateral institutions & treaty withdrawals (Borders)'], refs:[{tag:'REPORTING',text:'TIME; Columbia Climate Law'}]},\n            {id:'envreg', name:'Environmental regulation, lands & resources', changes:[{t:'NEPA/CEQ permitting changes; EPA deregulation; public lands', status:'partial'}], crosslinks:['The deregulation wave'], refs:[{tag:'REPORTING',text:'GW Regulatory Studies'}]}\n          ]}\n        ]\n      },\n      {\n        id:'health', num:'03', name:'Health & welfare', status:'structure',\n        statusNote:'Structure locked (three Tier-2 parents, 11 Tier-3 nodes). Spines complete; change-interpretation pending.',\n        gist:'A ~$1 trillion Medicaid restructuring, expiring ACA subsidies, an HHS reorganization under RFK Jr., contested vaccine policy, and a tightened safety net.',\n        logic:'Framed as fiscal discipline, program integrity, and a \"Make America Healthy Again\" focus on chronic disease; critics project large coverage losses and weakened public-health capacity.',\n        clusters:[\n          {title:'Medicaid restructuring (OBBBA)', blurb:'~$1T in federal Medicaid cuts over ten years, 80-hour work requirements, and ~11.8M projected to lose coverage by 2034.', status:'enacted'},\n          {title:'ACA marketplaces', blurb:'Enhanced premium tax credits expired end-2025; subsidized premiums roughly double; ~3.1M projected to lose coverage.', status:'enacted'},\n          {title:'HHS reorganization', blurb:'RFK Jr.\\u2019s ~20,000-position reduction; a proposed near-halving of NIH; consolidation under a new agency.', status:'partial'},\n          {title:'Vaccines & immunization', blurb:'All 17 ACIP members removed and replaced; COVID recommendations narrowed. The most contested cluster.', status:'partial'},\n          {title:'The welfare safety net', blurb:'SNAP work requirements expanded; a TANF funding freeze; SSA staffing cuts and service restrictions.', status:'enacted'}\n        ],\n        threads:[{name:'The MAHA agenda'},{name:'The coverage cliff'},{name:'The agency-capacity drawdown'}],\n        tier2:[\n          {id:'coverage', code:'T2-1', name:'Health coverage & access', bridge:false, scope:'Who is insured and treated and on what terms, Medicaid, ACA, Medicare, reproductive/gender care, and the VA health system. The heaviest section.', tier3:[\n            {id:'medicaid', name:'Medicaid & CHIP', changes:[{t:'OBBBA cuts (~$1T/10yr); 80-hour work requirements (Jan 2027); ~11.8M coverage loss', status:'enacted'}], crosslinks:['The coverage cliff'], refs:[{tag:'REPORTING',text:'KFF'}]},\n            {id:'aca :'2025-06-09', status:'partial'},{t:'Measles surge (>2,000 cases) as backdrop', status:'contested'}], crosslinks:['The MAHA agenda'], refs:[{tag:'REPORTING',text:'CDC'}]},\n            {id:'biomed', name:'Biomedical research, FDA & food/drug safety', changes:[{t:'NIH 15% indirect-cost cap enjoined (Apr 2025), upheld on appeal (Jan 2026); institute consolidation 27→8', status:'blocked'}], crosslinks:['The MAHA agenda'], refs:[{tag:'REPORTING',text:'NIH; First Circuit'}]}\n          ]},\n          {id:'safetynet', code:'T2-3', name:'Income & economic security (the safety net)', bridge:true, scope:'The means-tested and social-insurance safety net, SNAP, cash/family/housing assistance, and Social Security administration.', tier3:[\n            {id:'snap', name:'Nutrition assistance (SNAP)', changes:[{t:'OBBBA ABAWD work requirements to age 64; FY2028 state cost-share; tightened noncitizen eligibility', status:'enacted'}], crosslinks:['Trade & manufacturing (Economy & work)'], refs:[{tag:'REPORTING',text:'CBPP'}]},\n            {id:'cash', name:'Cash, family & housing assistance', changes:[{t:'TANF funding freeze (~$7.35B withheld); Head Start/ACF cuts; proposed HUD eliminations', status:'partial'}], crosslinks:[], refs:[{tag:'REPORTING',text:'CLASP'}]},\n            {id:'ssa', name:'Social Security administration & retirement security', changes:[{t:'~7,000 SSA staffing cuts; service restrictions; 100% overpayment recovery; DOGE data access', status:'partial'}], crosslinks:['DOGE & agency dismantlement (Govt & power)'], refs:[{tag:'REPORTING',text:'NASI'}]}\n          ]}\n        ]\n      },\n      {\n        id:'rights', num:'04', name:'Rights & justice', status:'structure',\n        statusNote:'Structure locked (three Tier-2 parents, 11 Tier-3 nodes). Spines complete; change-interpretation pending.',\n        gist:'A sweeping DEI rollback, a binary-sex redefinition applied across government, a reoriented civil-rights enforcement posture, and a set of law-and-order measures.',\n        logic:'Framed as restoring merit, equal treatment, and public safety; critics see an erosion of civil-rights protections and of transgender rights.',\n        clusters:[\n          {title:'Anti-DEI realignment', blurb:'EO 14151 and EO 14173 revoke the EO 11246 affirmative-action framework; a 2026 contractor DEI clause exposes firms to False Claims Act liability.', status:'partial'},\n          {title:'Gender & LGBTQ+ rights', blurb:'EO 14168 defines sex as binary; the transgender military ban took effect; gender-affirming care for minors restricted.', status:'partial'},\n          {title:'Civil-rights enforcement', blurb:'DOJ froze litigation, withdrew from police consent decrees, and repointed Title VI toward campus antisemitism and anti-DEI probes.', status:'enacted'},\n          {title:'Free speech & expression', blurb:'EO 14188 became the basis for removal proceedings against noncitizen campus protesters, a two-directional cluster.', status:'blocked'},\n          {title:'Criminal justice & policing', blurb:'A death-penalty EO, the lifting of the federal execution moratorium, and \"law and order\" orders.', status:'enacted'}\n        ],\n        threads:[{name:'The anti-DEI campaign'},{name:'The gender-ideology rollback'},{name:'The campus-antisemitism / protest crackdown'},{name:'The law-and-order push'}],\n        tier2:[\n          {id:'equality', code:'T2-1', name:'Equality & anti-discrimination', bridge:false, scope:'Who is protected from discrimination and on what terms, DEI/affirmative-action rollback, civil-rights enforcement, and the binary-sex redefinition. The heaviest section.', tier3:[\n            {id:'dei', name:'DEI rollback & the merit reframe', changes:[{t:'EO 14151, EO 14173 (revoking EO 11246); disparate-impact deprioritized; EO 14398 contractor clause', date:'2025–2026', status:'partial'},{t:'20-attorney-general suit over the 2026 contractor order', date:'2026-06-10', status:'contested'}], crosslinks:['The anti-DEI campaign'], refs:[{tag:'REPORTING',text:'Federal Register'}]},\n            {id:'crenforce', name:'Civil-rights enforcement reorientation', changes:[{t:'Civil Rights Division litigation freeze; consent-decree withdrawals; Title VI repurposed', date:'2025-05-21', status:'enacted'}], crosslinks:['Justice, law enforcement & the courts (Govt & power)'], refs:[{tag:'REPORTING',text:'DOJ'}]},\n            {id:'sexdef', name:'Legal definition of sex & recognition', changes:[{t:'EO 14168 binary-sex definition; passports, IDs, Title IX, women\\u2019s sports (EO 14201)', status:'partial'}], crosslinks:['The gender-ideology rollback'], refs:[{tag:'REPORTING',text:'Federal Register'}]},\n            {id:'transmil', name:'Transgender military service', changes:[{t:'EO 14183 barring transgender service; SCOTUS allowed the ban to take effect', date:'2025-01-27', status:'enacted'}], crosslinks:[], refs:[{tag:'REPORTING',text:'SCOTUS'}]},\n            {id:'gac', name:'Gender-affirming medical care', changes:[{t:'EO 14187; hospital-funding threats partly enjoined; focus on minors', status:'blocked'}], crosslinks:['Reproductive & gender-related care (Health & welfare)'], refs:[{tag:'REPORTING',text:'Courts'}]}\n          ]},\n          {id:'expression', code:'T2-2', name:'Free expression, religion & belief', bridge:true, scope:'The First Amendment freedoms, speech and protest, and religious liberty and conscience. The speech node is two-directional.', tier3:[\n            {id:'speech', name:'Free speech & expression', changes:[{t:'EO 14188; removal proceedings against noncitizen campus protesters (Khalil); press-access disputes', date:'2025-03-08', status:'blocked'},{t:'\"Anti-censorship / restoring free speech\" line', status:'contested'}], crosslinks:['Immigration & border control (Borders)','The campus-antisemitism crackdown'], refs:[{tag:'REPORTING',text:'Courts'}]},\n            {id:'religion', name:'Religious liberty & conscience', changes:[{t:'Religious Liberty Commission (housed at DOJ) tary-executive push testing Humphrey\\u2019s Executor, purged watchdogs, impoundment fights, and domestic use of force.',\n        logic:'Framed as restoring democratic control over an unaccountable bureaucracy; critics see a challenge to the separation of powers and the rule of law.',\n        clusters:[\n          {title:'DOGE & agency dismantlement', blurb:'The Department of Government Efficiency shut USAID, tried to close the CFPB and wind down Education, before being quietly wound down itself.', status:'partial'},\n          {title:'The unitary executive', blurb:'FTC and Fed removals reached the Supreme Court, which appeared ready to narrow or overrule Humphrey\\u2019s Executor (1935).', status:'contested'},\n          {title:'Schedule F', blurb:'~50,000 policy-influencing career positions reclassified toward an at-will excepted-service category.', status:'partial'},\n          {title:'Inspectors general', blurb:'At least 17 IGs fired without the statutory 30-day notice; a court ruled the firings unlawful but declined reinstatement.', status:'blocked'},\n          {title:'Domestic use of force', blurb:'National Guard troops deployed into several cities across 2025; courts found the Los Angeles deployment violated Posse Comitatus.', status:'blocked'}\n        ],\n        threads:[{name:'The DOGE blitz'},{name:'The unitary-executive cases'},{name:'The weaponization / retribution line'},{name:'The courts standoff'},{name:'Power over the states'},{name:'The accountability blackout'}],\n        tier2:[\n          {id:'adminstate', code:'T2-1', name:'Agency restructuring & the administrative state', bridge:false, scope:'Reshaping the structure of the bureaucracy, DOGE, agency dismantlement, and cross-cutting deregulation. v1 core; highest change-mass.', tier3:[\n            {id:'doge', name:'DOGE & agency dismantlement', changes:[{t:'DOGE established (charter sunset 2026-07-04); shut USAID; tried to close CFPB and wind down Education', date:'2025-01-20', status:'partial'}], crosslinks:['The DOGE blitz','Foreign assistance & development aid (Borders)'], refs:[{tag:'REPORTING',text:'White House; CRS'}]},\n            {id:'dereg', name:'Deregulation & deconstruction of the administrative state', changes:[{t:'EO 14192 (10-out-for-1-in); EO 14219; OIRA review compressed; \"unlawful-delegation\" rationale', status:'enacted'}], crosslinks:['The deregulation wave (Economy & work)'], refs:[{tag:'REPORTING',text:'Skadden'}]}\n          ]},\n          {id:'unitary', code:'T2-2', name:'Presidential control & the unitary executive', bridge:true, scope:'Who controls the bureaucracy, removal power, agency independence, and the career civil service. The constitutional throughline.', tier3:[\n            {id:'removal', name:'Removal power & agency independence', changes:[{t:'EO 14215; FTC removals and Trump v. Slaughter (argued Dec 2025); Fed / Lisa Cook removal (argued Jan 2026)', status:'contested'}], crosslinks:['The unitary-executive cases'], refs:[{tag:'REPORTING',text:'NPR; SCOTUSblog'}]},\n            {id:'schedulef', name:'The career civil service & Schedule F', changes:[{t:'\"Schedule Policy/Career\" reinstated; ~50,000 roles toward at-will status', date:'2025-01-20', status:'partial'}], crosslinks:['The federal workforce (Economy & work)'], refs:[{tag:'REPORTING',text:'CRS; Government Executive'}]}\n          ]},\n          {id:'oversight', code:'T2-3', name:'Oversight, accountability & the power of the purse', bridge:false, scope:'The checks on executive power, inspectors general, impoundment/spending, and government-data integrity.', tier3:[\n            {id:'ig', name:'Inspectors general & internal watchdogs', changes:[{t:'≥17 IGs fired without statutory notice; ruled unlawful but not reinstated', date:'2025-01-24', status:'blocked'}], crosslinks:['The accountability blackout'], refs:[{tag:'REPORTING',text:'Partnership for Public Service'}]},\n            {id:'impound', name:'Spending power & impoundment', changes:[{t:'GAO impoundment findings (DOT EV grants, Head Start, FEMA); Vought impoundment posture', status:'contested'}], crosslinks:['Federal spending & the budget (Economy & work)'], refs:[{tag:'REPORTING',text:'GAO; TPM'}]},\n            {id:'data', name:'Government data, statistics & information integrity', changes:[{t:'BLS commissioner fired after a weak jobs report; \"faked data\" allegation', date:'2025-08-01', status:'enacted'}], crosslinks:['The accountability blackout'], refs:[{tag:'REPORTING',text:'NBC; CNBC'}]}\n          ]},\n          {id:'justice', code:'T2-4', name:'Justice, law enforcement & the courts', bridge:true, scope:'The legal and coercive apparatus and the judicial check, DOJ/prosecutorial power, clemency, and the executive–judiciary relationship.', tier3:[\n            {id:'doj', name:'DOJ, prosecutorial power & clemency', changes:[{t:'Weaponization Working Group; Jan 6 prosecutors fired; ~1,500+ Jan 6 clemency grants', date:'2025', status:'enacted'}], crosslinks:['The weaponization / retribution line','Civil-rights enforcement (Rights & justice)'], refs:[{tag:'REPORTING',text:'PBS; IBA'}]},\n            {id:'courts', name:'The federal courts & the executive', changes:[{t:'Trump v. CASA curtailed nationwide injunctions; emergency-docket use; compliance disputes', date:'2025-06-27', status:'enacted'}], crosslinks:['The courts standoff','Legal status & belonging (Borders)'], refs:[{tag:'REPORTING',text:'SCOTUSblog; CRS'}]}\n          ]},\n          {id:'federalism', code:'T2-5', name:'States, elections & the democratic process', bridge:true, scope:'The vertical and electoral structure, federalism/domestic use of force and election administration.', tier3:[\n            {id:'fed', name:'Federalism & power over the states', changes:[{t:'National Guard federalizations and deployments; Posse Comitatus rulings; sanctuary funding conditions', date:'2025–2026', status:'blocked'}], crosslinks:['Power over the states','Civil-military relations & domestic use (Borders)'], refs:[{tag:'REPORTING',text:'American Oversight'}]},\n            {id:'elections', name:'Elections & the democratic process', changes:[{t:'EO 14399 (proof-of-citizenship, funding conditions); repeatedly blocked; SAVE Act stalled', date:'2025-03-25', status:'blocked'}], crosslinks:['Elections (Rights & justice)'], refs:[{tag:'REPORTING',text:'Votebeat; ACLU'}]}\n          ]}\n        ]\n      }\n    ],\n    funnel:[\n      {step:'Step 1', name:'Anchor the baseline', desc:'Start with nonpartisan bodies whose mandate is even-handedness, CRS, GAO, CBO, the National Academies, and canonical university-press reference histories. The uncontested \"how it works\" floor.'},\n      {step:'Step 2', name:'Frames by convergence', desc:'A lens counts as canonical only when it shows up across independent signals, university-press standing, syllabi, handbook bibliographies, cross-spectrum citation. Convergence, not taste.'},\n      {step:'Step 3', name:'Balance the contested layer', desc:'Where interpretation is genuinely live, pull the strongest version of each major tradition and log each source\\u2019s leaning. Guard against false balance.'},\n      {step:'Step 4', name:'Gate & cap', desc:'Every candidate passes four gates (reputable, durable, traceable, even-handedness contribution) and the set is held to a bounded count. Lean by default.'},\n      {step:'Step 5', name:'Record provenance', desc:'For each source: title, author/body, date, URL, a one-line \"what it establishes,\" and which signal surfaced it. This column is the methodology in miniature.'},\n      {step:'Step 6', name:'Verification gate', desc:'A blocking self-audit, ideally by an independent pass, over coverage, balance, citation integrity, and provenance before anything is shown. PASS / NEEDS-WORK, with gaps named.'}\n    ]\n  };\n\n  state = { view:'welcome', uId:null, t2Id:null, nodeId:null, expanded:{} };\n\n  _toggleChange(key){\n    this.setState(s=>{ const e=Object.assign({},s.expanded); e[key]=!e[key]; return {expanded:e}; });\n  }\n\n  _go(patch){ this.setState(patch); }\n  goWelcome = () => this._go({view:'welcome', uId:null, t2Id:null, nodeId:null});\n  goHome = () => this._go({view:'home', uId:null, t2Id:null, nodeId:null});\n  goThreads = () => this._go({view:'threads'});\n  goMethod = () => this._go({view:'method'});\n  goProcess = () => this._go({view:'process'});\n\n  componentDidMount(){\n    let el = this._el ? this._el.parentElement : document.querySelector('[data-view-root]');\n    let s = el;\n    while(s && s!==document.body && s!==document.documentElement){\n      const oy = getComputedStyle(s).overflowY;\n      if((oy==='auto'||oy==='scroll') && s.scrollHeight > s.clientHeight+4){ this._scroller = s; break; }\n      s = s.parentElement;\n    }\n    this._lastKey = this._viewKey();\n  }\n\n  _viewKey(){\n    return this.state.view+'/'+this.state.uId+'/'+this.state.t2Id+'/'+this.state.nodeId;\n  }\n\n  componentDidUpdate(){\n    const key = this._viewKey();\n    if(key !== this._lastKey){\n      this._lastKey = key;\n      const el = document.querySelector('[data-view-root]');\n      if(el){ el.style.animation='none'; void el.offsetWidth; el.style.animation='mfIn .5s cubic-bezier(.22,.61,.36,1)'; }\n      if(this._scroller){ this._scroller.scrollTop = 0; }\n      window.scrollTo(0,0);\n      if(document.scrollingElement){ document.scrollingElement.scrollTop = 0; }\n    }\n  }\n\n  _st(key){ return this.ST[key] || this.ST.contested; }\n\n  _titleCase(str){\n    if(!str) return str;\n    const minor = new Set(['a','an','and','as','at','but','by','for','in','of','on','or','the','to','vs','via','with','nor','per']);\n    return str.split(' ').map((word,i,arr)=>{\n      if(!word) return word;\n      if(word==='&') return '&';\n      const core = word.replace(/[^A-Za-z]/g,'');\n      if(core.length>1 && core===core.toUpperCase()) return word;\n      const lower = word.toLowerCase();\n      if(i!==0 && i!==arr.length-1 && minor.has(lower.replace(/[^a-z]/g,''))) return lower;\n      return word.charAt(0).toUpperCase()+word.slice(1);\n    }).join(' ');\n  }\n\n  renderVals(){\n    const D = this.DATA;\n    const st = this.state;\n    const u = D.umbrellas.find(x=>x.id===st.uId) || null;\n    const t2 = u ? (u.tier2.find(x=>x.id===st.t2Id) || null) : null;\n    const node = t2 ? (t2.tier3.find(x=>x.id===st.nodeId) || null) : null;\n\n    const isWelcome = st.view==='welcome';\n    const isHome = st.view==='home';\n    const isUmbrella = st.view==='umbrella' && !!u;\n    const isNode = st.view==='node' && !!t2 && !!node;\n    const isThreads = st.view==='threads';\n    const isMethod = st.view==='method';\n    const isProcess = st.view==='process';\n\n    const openUmbrella = (id) => this._go({view:'umbrella', uId:id, t2Id:null, nodeId:null});\n    const openTier2 = (uid,t2id) => {\n      const uu = D.umbrellas.find(x=>x.id===uid);\n      const first = uu.tier2.find(x=>x.id===t2id).tier3[0];\n      this._go({view:'node', uId:uid, t2Id:t2id, nodeId:first.id});\n    };\n    const openNode = (uid,t2id,nid) => this._go({view:'node', uId:uid, t2Id:t2id, nodeId:nid});\n\n    // umbrellas for home (display order by num)\n    const umbrellas = D.umbrellas.slice().sort((a,b)=>a.num.localeCompare(b.num)).map(x=>({\n      id:x.id, num:x.num, name:this._titleCase(x.name), gist:x.gist, logic:x.logic,\n      statusLabel: x.status==='built' ? 'Pilot · built to Tier 3' : 'Structure locked',\n      statusColor: x.status==='built' ? '#3E6B4F' : '#8A867C',\n      statusBorder: x.status==='built' ? 'rgba(62,107,79,.5)' : 'rgba(138,134,124,.5)',\n      t2Count: x.tier2.length,\n      clusterCount: x.clusters.length,\n      open: () => openUmbrella(x.id)\n    }));\n\n    // ladder\n    const ladder = [\n      {num:'L1', label:'Gist', active:isHome, enabled:true, open:this.goHome},\n      {num:'L2', label:'Breakdown', active:isUmbrella, enabled:!!u, open:()=> u ? openUmbrella(u.id) : this.goHome},\n      {num:'L3', label:'Deepest', active:isNode, enabled:!!node, open:()=> (u&&t2&&node) ? openNode(u.id,t2.id,node.id) : null}\n    ].map(s=>({\n      num:s.num, label:s.label,\n      color: s.active ? '#20201D' : (s.enabled ? '#8A867C' : '#C6BFB0'),\n      numColor: s.active ? '#A9741F' : (s.enabled ? '#B8B2A5' : '#D4CFC2'),\n      bg: s.active ? 'rgba(169,116,31,.1)' : 'transparent',\n      cursor: s.enabled ? 'pointer' : 'default',\n      open: s.enabled ? s.open : (()=>{})\n    }));\n\n    // umbrella view model\n    let uVM = null;\n    if(u){\n      uVM = {\n        num:u.num, name:this._titleCase(u.name), gist:u.gist, logic:u.logic,\n        statusLabel: u.status==='built' ? 'Built to Tier 3 (pilot)' : 'Structure locked',\n        statusColor: u.status==='built' ? '#3E6B4F' : '#8A867C',\n        statusNote: u.statusNote,\n        t2Count: u.tier2.length,\n        tier2: u.tier2.map(t=>({\n          code:t.code, name:this._titleCase(t.name), scope:t.scope, bridge:!!t.bridge,\n          nodeCount: t.tier3.length,\n          open: () => openTier2(u.id, t.id)\n        })),\n        clusters: u.clusters.map((c,i)=>({\n          n: String(i+1).padStart(2,'0'), title:this._titleCase(c.title), blurb:c.blurb,\n          stLabel: this._st(c.status).l, stColor: this._st(c.status).c\n        })),\n        threads: u.threads.map(th=>({name:this._titleCase(th.name)}))\n      };\n    }\n\n    // t2 view model (for node view aside)\n    let t2VM = null;\n    if(u && t2){\n      t2VM = {\n        code:t2.code, name:this._titleCase(t2.name),\n        tier3: t2.tier3.map(n=>({\n          name:this._titleCase(n.name),\n          active: n.id===st.nodeId,\n          bg: n.id===st.nodeId ? 'rgba(169,116,31,.1)' : 'transparent',\n          bar: n.id===st.nodeId ? '#A9741F' : 'rgba(32,32,29,.14)',\n          color: n.id===st.nodeId ? '#20201D' : '#5A574D',\n          weight: n.id===st.nodeId ? 600 : 500,\n          open: () => openNode(u.id, t2.id, n.id)\n        }))\n      };\n    }\n\n    // node view model\n    let nodeVM = null;\n    if(node){\n      const spineArr = (Array.isArray(node.spine) && node.spine.length>0) ? node.spine : (this.SPINES[st.uId+'/'+node.id] || []);\n      const hasSpine = spineArr.length>0;\n      const verifiedDefault = '2026-07-04';\n      const anchorDefault = (node.refs && node.refs[0]) ? node.refs[0].text : '';\n      nodeVM = {\n        name:this._titleCase(node.name),\n        hasSpine, noSpine:!hasSpine,\n        spine: spineArr,\n        changes: (node.changes||[]).map((c,i)=>{\n          const so = this._st(c.status);\n          const sources = c.sources || [];\n          const legal = c.legal || [];\n          const links = c.links || [];\n          const history = c.history || [];\n          const hasHistory = history.length>0;\n          const hasLegal = legal.length>0;\n          const hasLinks = links.length>0;\n          const hasSources = sources.length>0;\n          const hasSummary = !!c.summary;\n          const hasImpact = !!c.impact;\n          const canExpand = hasSummary || hasImpact || hasSources || hasLegal || hasLinks || hasHistory;\n          const key = st.uId+'/'+st.t2Id+'/'+st.nodeId+'/'+i;\n          const expanded = canExpand && !!this.state.expanded[key];\n          return {\n            t:c.t, date:c.date||'', agency:c.agency||'',\n            mech:c.mech||'', hasMech:!!c.mech,\n            noAnchor:!!c.noAnchor,\n            stLabel:so.l, stColor:so.c,\n            cursor: canExpand ? 'pointer' : 'default',\n            expanded,\n            toggleIcon: canExpand ? (expanded ? '\\u2212' : '+') : '',\n            toggle: canExpand ? (()=>this._toggleChange(key)) : (()=>{}),\n            summary:c.summary||'', hasSummary,\n            hasHistory, statusHistory: history.map(h=>({date:h.date, label:h.label})),\n            impact:c.impact||'', hasImpact,\n            hasSources, sources: sources.map(s=>({label:s.label, url:s.url||'#'})),\n            hasLegal, legal: legal.map(l=>({docket:l.docket, court:l.court, status:l.status, url:l.url||'#'})),\n            hasLinks, crossLinks: links.map(l=>({node:l.node, how:l.how})),\n            anchor:c.anchor||anchorDefault, hasAnchor: !!(c.anchor||anchorDefault),\n            verified:c.verified||verifiedDefault\n          };\n        }),\n        crosslinks: node.crosslinks || [],\n        refs: node.refs || []\n      };\n    }\n\n    // breadcrumbs\n    let crumbs = [];\n    if(isUmbrella){\n      crumbs = [\n        {label:'All areas', open:this.goHome, active:false},\n        {label:this._titleCase(u.name), open:()=>openUmbrella(u.id), active:true}\n      ];\n    } else if(isNode){\n      crumbs = [\n        {label:'All areas', open:this.goHome, active:false},\n        {label:this._titleCase(u.name), open:()=>openUmbrella(u.id), active:false},\n        {label:this._titleCase(t2.name), open:()=>openTier2(u.id,t2.id), active:false},\n        {label:this._titleCase(node.name), open:()=>{}, active:true}\n      ];\n    } else if(isThreads){\n      crumbs = [{label:'All areas', open:this.goHome, active:false},{label:'Reading threads', open:()=>{}, active:true}];\n    } else if(isMethod){\n      crumbs = [{label:'All areas', open:this.goHome, active:false},{label:'Methodology', open:()=>{}, active:true}];\n    } else if(isProcess){\n      crumbs = [{label:'Welcome', open:this.goWelcome, active:false},{label:'How this was built', open:()=>{}, active:true}];\n    }\n    const crumbVM = crumbs.map((c,i)=>({\n      label:c.label, open:c.open,\n      color: c.active ? '#20201D' : '#8A867C',\n      weight: c.active ? 600 : 500,\n      sep: i < crumbs.length-1 ? '/' : ''\n    }));\n\n    // all threads (for threads view)\n    const allThreads = [];\n    D.umbrellas.slice().sort((a,b)=>a.num.localeCompare(b.num)).forEach(x=>{\n      (x.threads||[]).forEach(th=>{\n        allThreads.push({ umbrella:this._titleCase(x.name), name:this._titleCase(th.name), blurb: this._threadBlurb(th.name), nodes:this._threadNodes(th.name).map(n=>this._titleCase(n)) });\n      });\n    });\n\n    const showFraming = this.props.showFraming ?? true;\n    const showStatus = this.props.showStatus ?? true;\n    const showThreads = this.props.showThreads ?? true;\n\n    return {\n      isWelcome, isProcess,\n      isHome: isHome || (isThreads && !showThreads), isUmbrella, isNode, isThreads: isThreads && showThreads, isMethod,\n      showFraming, showStatus, showThreads,\n      hasCrumb: !isHome && !isWelcome,\n      goWelcome:this.goWelcome, goHome:this.goHome, goThreads:this.goThreads, goMethod:this.goMethod, goProcess:this.goProcess,\n      startReading: () => openUmbrella('borders'),\n      umbrellas, ladder, crumbs:crumbVM,\n      u:uVM, t2:t2VM, node:nodeVM,\n      statusLegend: this.STATUS_LEGEND,\n      allThreads, funnel:D.funnel\n    };\n  }\n\n  _threadBlurb(name){\n    const m = {\n      'The Venezuela campaign':'A military operation, a legal maneuver (Tren de Aragua as an FTO), a diplomatic gambit, and an economic one (oil-tanker seizure), the same campaign filed under four nodes.',\n      'The Greenland gambit':'Territorial diplomacy enforced with a tariff threat against a NATO ally, a combination with no direct precedent in American foreign policy.',\n      'The China contest':'Deterrence, the chip/rare-earth war, and the October 2025 trade deal, inseparable strands stitched by a \"China\" tag rather than a single node.',\n      'The Ukraine settlement':'A settlement push, a NATO drawdown, and a minerals deal, read as one episode across diplomacy, force posture, and economic statecraft.',\n      'Soft-power retrenchment':'Foreign-assistance cuts, the VOA/USAGM shutdown, and multilateral withdrawals, the retreat from soft power read as one arc.',\n      'The OBBBA megabill':'One law spanning tax policy, federal spending, and the IRA clean-energy repeal, with a debt-limit hike and immigration funding reaching into other umbrellas.',\n      'The affordability squeeze':'Tariffs, energy prices, housing, and grocery costs set against the offsetting OBBBA tax cuts, the umbrella\\u2019s cost-of-living read-layer.',\n      'The tariff-and-reshore push':'Tariffs and industrial policy plus critical-minerals onshoring and agriculture fallout, the reshoring campaign across nodes.',\n      'The deregulation wave':'CFPB, bank rules, labor-rule rollbacks, and NEPA/environmental dereg, a set of deregulatory actions, framed without a single master-plan claim.',\n      'The MAHA agenda':'Distributed across vaccines, food-dye/FDA actions, and SNAP junk-food rules, carried as a thread because its binding-regulation footprint is thin.',\n      'The coverage cliff':'Medicaid cuts and the ACA subsidy expiration read together as the umbrella\\u2019s coverage-loss episode.',\n      'The agency-capacity drawdown':'The HHS reduction, NIH consolidation, and SSA staffing cuts read as one capacity story.',\n      'The anti-DEI campaign':'DEI rollback, the Title VI enforcement turn, and the contractor orders, reaching into federal-contractor compliance and DOJ.',\n      'The gender-ideology rollback':'One binary-sex redefinition applied across four fronts, definition, military service, medical care, and Title IX.',\n      'The campus-antisemitism / protest crackdown':'The antisemitism EO supplying the basis for both Title VI probes and noncitizen removals, among the most contested threads.',\n      'The law-and-order push':'Policing orders, capital punishment, the DC crime emergency, and immigration enforcement, bridging federalism and Borders.',\n      'The DOGE blitz':'Agency dismantlement, withheld appropriations, RIFs, and deregulation, one campaign across structure, purse, and personnel.',\n      'The unitary-executive cases':'Trump v. Slaughter, the Lisa Cook removal, EO 14215, and the NLRB fight, a litigation arc described as a set of cases and stated positions.',\n      'The weaponization / retribution line':'DOJ prosecutorial power, the Weaponization Working Group, fired Jan 6 prosecutors, and Jan 6 clemency, presented with a range of readings, never a verdict on motive.',\n      'The courts standoff':'Trump v. CASA\\u2019s injunction limit, compliance disputes, and the birthright-citizenship vehicle, how the executive–judiciary balance was contested.',\n      'Power over the states':'National Guard federalizations, Posse Comitatus rulings, and sanctuary-funding conditions, bridging Borders and immigration.',\n      'The accountability blackout':'IG firings, GAO impoundment findings, and the BLS commissioner firing, the watchdog-and-information layer read as one episode.'\n    };\n    return m[name] || 'A named episode assembled across nodes from the same change records.';\n  }\n  _threadNodes(name){\n    const m = {\n      'The Venezuela campaign':['Homeland & W. Hemisphere','Enforcement & removal','Tariffs & sanctions'],\n      'The Greenland gambit':['Western Hemisphere & territorial','Tariffs & trade coercion','Strategy & force posture'],\n      'The China contest':['Indo-Pacific & China','Export controls','Tariffs'],\n      'The Ukraine settlement':['Russia/Ukraine','Force posture','Critical minerals'],\n      'Soft-power retrenchment':['Foreign assistance','Broadcasting','Multilateral withdrawals'],\n      'The OBBBA megabill':['Tax policy','Federal spending','Clean-energy rollback'],\n      'The affordability squeeze':['Tariffs','Energy prices','Housing'],\n      'The tariff-and-reshore push':['Tariffs & trade','Industrial policy','Critical minerals'],\n      'The deregulation wave':['CFPB','Labor rules','NEPA / environment'],\n      'The MAHA agenda':['Vaccines','FDA / food','SNAP'],\n      'The coverage cliff':['Medicaid','ACA marketplaces'],\n      'The agency-capacity drawdown':['HHS reorg','Biomedical / NIH','SSA'],\n      'The anti-DEI campaign':['DEI rollback','Civil-rights enforcement','Contractor orders'],\n      'The gender-ideology rollback':['Definition of sex','Trans military','Gender care','Title IX'],\n      'The campus-antisemitism / protest crackdown':['Free speech','Title VI','Noncitizen removals'],\n      'The law-and-order push':['Policing','Capital punishment','DC emergency'],\n      'The DOGE blitz':['DOGE dismantlement','Impoundment','Federal workforce','Deregulation'],\n      'The unitary-executive cases':['Removal power','NLRB fight','Humphrey\\u2019s Executor'],\n      'The weaponization / retribution line':['DOJ power','Jan 6 prosecutors','Jan 6 clemency'],\n      'The courts standoff':['Trump v. CASA','Compliance disputes','Birthright vehicle'],\n      'Power over the states':['Federalism','Posse Comitatus','Sanctuary funding'],\n      'The accountability blackout':['Inspectors general','GAO impoundment','BLS firing']\n    };\n    return m[name] || [];\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
